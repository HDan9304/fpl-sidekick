<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Mobile Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- MOBILE FIRST DESIGN --- */
        :root {
            --primary: #37003c;
            --accent: #00ff85;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #111;
            --gray: #666;
            --border: #e5e7eb;
            --red: #e90052;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* HEADER */
        header {
            background: var(--surface); height: 60px; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .brand { font-weight: 800; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 6px; }
        .brand i { color: var(--accent); }

        /* MENU BUTTON */
        .menu-btn { font-size: 1.2rem; padding: 8px; cursor: pointer; }

        /* USER ICON */
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 0.9rem; border: 1px solid var(--border);
        }
        .user-avatar.active { background: var(--primary); color: var(--accent); border: none; }

        /* CONTAINER */
        .main { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* STATUS LOG (Visible for debugging) */
        .status-log {
            font-size: 0.75rem; color: var(--gray); text-align: center;
            margin-bottom: 15px; background: #eee; padding: 5px; border-radius: 4px;
            display: none; /* Hidden unless active */
        }

        /* WELCOME CARD */
        .card {
            background: var(--surface); padding: 30px 20px; border-radius: 16px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-top: 20px;
        }
        .card h2 { margin: 10px 0 5px; font-size: 1.3rem; }
        .card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 14px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 1rem; text-align: center; margin-bottom: 15px;
            background: #fafafa;
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; }

        .btn {
            background: var(--primary); color: white; border: none; padding: 14px;
            border-radius: 10px; width: 100%; font-weight: 600; font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }

        /* DASHBOARD */
        .manager-info { text-align: center; margin-bottom: 25px; padding: 20px; background: var(--primary); color: white; border-radius: 16px; }
        .manager-name { font-size: 1.2rem; font-weight: 700; }
        .manager-rank { font-size: 0.85rem; opacity: 0.8; margin-top: 5px; }

        .list-header {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            color: var(--gray); margin-bottom: 8px; padding-left: 5px; letter-spacing: 0.5px;
        }

        .player-row {
            background: var(--surface); padding: 12px 15px; border-radius: 12px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f0f0f0;
        }

        .p-left { display: flex; align-items: center; gap: 12px; }
        .pos-badge { width: 6px; height: 6px; border-radius: 50%; }
        .pos-1 { background: #fbbf24; } /* GK */
        .pos-2 { background: #3b82f6; } /* DEF */
        .pos-3 { background: #22c55e; } /* MID */
        .pos-4 { background: #ef4444; } /* FWD */

        .p-name { font-weight: 600; font-size: 0.95rem; }
        .p-meta { font-size: 0.75rem; color: var(--gray); }
        .p-price { font-weight: 700; font-size: 0.9rem; color: var(--primary); }

        .chip { 
            display: inline-flex; align-items: center; gap: 3px; 
            padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; 
            background: #fee2e2; color: var(--red); font-weight: 700; margin-left: 5px; 
        }

        /* LOADING SPINNER */
        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand"><i class="fa-solid fa-layer-group"></i> FPL Hub</div>
        <div class="user-avatar" id="userIcon" onclick="clearData()">
            <i class="fa-regular fa-user"></i>
        </div>
    </header>

    <div class="main">
        
        <div id="statusLog" class="status-log">Initializing...</div>

        <div id="welcomeScreen" class="card hidden">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📱</div>
            <h2>FPL Mobile</h2>
            <p>Connect your Team ID to start.</p>
            <input type="number" id="teamID" placeholder="Team ID (e.g. 123456)">
            <button class="btn" onclick="app.load()">
                <span>Connect Team</span>
            </button>
        </div>

        <div id="loadingScreen" class="card hidden">
            <div style="display: flex; justify-content: center; margin-bottom: 15px;">
                <div class="spinner"></div>
            </div>
            <p id="loadingMsg">Connecting...</p>
        </div>

        <div id="dashboardScreen" class="hidden">
            <div class="manager-info">
                <div class="manager-name" id="dispName">...</div>
                <div class="manager-rank" id="dispPoints">...</div>
            </div>

            <div class="list-header">Starting XI</div>
            <div id="startingList"></div>

            <div class="list-header" style="margin-top: 25px;">Bench</div>
            <div id="benchList"></div>
        </div>

    </div>

    <script>
        const app = {
            // CACHE SETTINGS
            cacheKey: 'fpl_db_v4',
            cacheTime: 'fpl_ts_v4',

            init: () => {
                const savedId = localStorage.getItem('fpl_id');
                if(savedId) {
                    document.getElementById('userIcon').classList.add('active');
                    document.getElementById('teamID').value = savedId;
                    app.load(savedId);
                } else {
                    app.show('welcomeScreen');
                }
            },

            show: (id) => {
                ['welcomeScreen', 'loadingScreen', 'dashboardScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
                document.getElementById(id).classList.remove('hidden');
            },

            log: (msg) => {
                const el = document.getElementById('statusLog');
                el.style.display = 'block';
                el.innerText = msg;
                console.log(msg);
            },

            // --- THE MULTI-PROXY FETCH SYSTEM ---
            fetchUrl: async (targetUrl) => {
                // List of proxies to try in order
                const proxies = [
                    (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    (url) => `https://thingproxy.freeboard.io/fetch/${url}`
                ];

                for (let i = 0; i < proxies.length; i++) {
                    const proxyUrl = proxies[i](targetUrl);
                    app.log(`Trying connection ${i + 1}/${proxies.length}...`);
                    
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 second timeout per proxy

                        const response = await fetch(proxyUrl, { signal: controller.signal });
                        clearTimeout(timeoutId);

                        if (response.ok) {
                            return await response.json();
                        }
                    } catch (err) {
                        console.warn(`Proxy ${i+1} failed:`, err);
                    }
                }
                throw new Error("All connections failed. FPL is blocking requests.");
            },

            load: async (savedId = null) => {
                const id = savedId || document.getElementById('teamID').value;
                if(!id) return alert("Please enter an ID");

                // Save ID
                localStorage.setItem('fpl_id', id);
                document.getElementById('userIcon').classList.add('active');
                
                app.show('loadingScreen');

                try {
                    // 1. CHECK CACHE FOR BIG DATABASE
                    // The player list is heavy. We only want to download it once every 30 mins.
                    let staticData = null;
                    const cachedDb = localStorage.getItem(app.cacheKey);
                    const cachedTime = localStorage.getItem(app.cacheTime);
                    const now = Date.now();

                    if(cachedDb && cachedTime && (now - cachedTime < 1800000)) { // 30 mins
                        app.log("Loading players from phone memory...");
                        staticData = JSON.parse(cachedDb);
                    } else {
                        app.log("Downloading Player Database...");
                        document.getElementById('loadingMsg').innerText = "Downloading Database (this happens once)...";
                        staticData = await app.fetchUrl('https://fantasy.premierleague.com/api/bootstrap-static/');
                        
                        // Save to phone memory
                        localStorage.setItem(app.cacheKey, JSON.stringify(staticData));
                        localStorage.setItem(app.cacheTime, now);
                    }

                    // 2. PROCESS PLAYER MAP
                    const players = {};
                    staticData.elements.forEach(p => {
                        players[p.id] = {
                            name: p.web_name,
                            team: staticData.teams.find(t => t.id === p.team).short_name,
                            pos: p.element_type,
                            price: p.now_cost / 10,
                            form: parseFloat(p.form)
                        };
                    });
                    const gw = staticData.events.find(e => e.is_current)?.id || 1;

                    // 3. GET USER TEAM (Small request)
                    app.log("Fetching your squad...");
                    document.getElementById('loadingMsg').innerText = "Scouting Team...";
                    
                    // We run these in sequence to be safer on mobile connections
                    const user = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/`);
                    const picks = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/event/${gw}/picks/`);

                    app.render(user, picks, players);
                    app.log(""); // Clear log
                    document.getElementById('statusLog').style.display = 'none';

                } catch (error) {
                    app.log("Connection Error");
                    alert("Network Error: " + error.message + "\n\nTry refreshing the page.");
                    localStorage.removeItem(app.cacheKey); // Clear cache if it failed
                    app.show('welcomeScreen');
                }
            },

            render: (user, picks, players) => {
                document.getElementById('dispName').innerText = user.name;
                document.getElementById('dispPoints').innerText = `${user.summary_overall_points} pts • GW${picks.entry_history.event}`;

                const sList = document.getElementById('startingList');
                const bList = document.getElementById('benchList');
                sList.innerHTML = ''; bList.innerHTML = '';

                picks.picks.forEach((pick, i) => {
                    const p = players[pick.element];
                    if(!p) return;

                    let badge = '';
                    if(i < 11 && p.form < 2.5) {
                        badge = `<span class="chip"><i class="fa-regular fa-snowflake"></i> ${p.form}</span>`;
                    }

                    const html = `
                        <div class="player-row">
                            <div class="p-left">
                                <div class="pos-badge pos-${p.pos}"></div>
                                <div>
                                    <div class="p-name">${p.name} ${badge}</div>
                                    <div class="p-meta">${p.team}</div>
                                </div>
                            </div>
                            <div class="p-price">£${p.price}</div>
                        </div>
                    `;

                    if(i < 11) sList.innerHTML += html;
                    else bList.innerHTML += html;
                });

                app.show('dashboardScreen');
            }
        };

        function clearData() {
            if(confirm("Unlink ID and reset data?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Start
        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
