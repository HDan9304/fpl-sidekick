<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #37003c; --accent: #00ff85;
            --bg-body: #f0f2f5; --bg-app: #ffffff;
            --text-main: #111827; --text-sub: #6b7280;
            --border: #e5e7eb; --red: #e90052;
            --grass-1: #059669; --grass-2: #047857;
            --status-warn: #fbbf24; --status-bad: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 600px; background-color: var(--bg-app); min-height: 100vh; position: relative; display: flex; flex-direction: column; }
        @media (min-width: 600px) {
            body { padding: 40px 0; }
            .app-container { min-height: auto; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); height: 90vh; overflow: hidden; }
        }

        /* HEADER */
        header { background: var(--bg-app); height: 60px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 50; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 1.2rem; cursor: pointer; padding: 8px; margin-left: -8px; }
        .brand { font-weight: 800; font-size: 1.2rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .brand i { color: var(--accent); }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6; border: 1px solid var(--border); color: var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .user-avatar.active { background: var(--primary); color: var(--accent); border-color: var(--primary); }
        .trophy-btn { font-size: 1.2rem; color: #fbbf24; cursor: pointer; padding: 5px; margin-right: 10px; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: var(--bg-app); z-index: 200; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 4px 0 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.open { transform: translateX(0); }
        .menu-header { height: 60px; display: flex; align-items: center; padding-left: 24px; font-weight: 800; color: var(--primary); font-size: 1.2rem; border-bottom: 1px solid var(--border); }
        .menu-items { flex: 1; padding-top: 10px; }
        .menu-item { display: flex; align-items: center; gap: 16px; padding: 16px 24px; color: var(--text-sub); font-weight: 600; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .menu-item.active { color: var(--primary); background: rgba(55, 0, 60, 0.04); border-left-color: var(--primary); }
        .menu-footer { padding: 20px; border-top: 1px solid var(--border); margin-top: auto; }
        .logout-btn { width: 100%; padding: 12px; border: 1px solid #fee2e2; background: #fef2f2; color: #ef4444; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 150; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px); }
        .menu-overlay.open { opacity: 1; visibility: visible; }

        /* SCOREBOARD */
        .content { padding: 15px; overflow-y: auto; flex: 1; }
        .scoreboard { background: var(--primary); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(55, 0, 60, 0.2); }
        .manager-name { font-size: 1.1rem; font-weight: 800; text-align: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; font-weight: 600; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
        .stat-val-small { font-size: 0.9rem; font-weight: 700; color: white; }

        /* PITCH */
        .pitch-wrapper { background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        .budget-bar { background: white; padding: 8px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; color: var(--text-sub); }
        .budget-val { color: var(--primary); font-weight: 800; }
        .pitch-container { background: repeating-linear-gradient(0deg, var(--grass-1), var(--grass-1) 20px, var(--grass-2) 20px, var(--grass-2) 40px); padding: 25px 5px; position: relative; min-height: 480px; }
        .field-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; position: relative; z-index: 10; }
        
        /* PLAYERS */
        .player-pill { background: rgba(255,255,255,0.95); width: 68px; padding: 6px 2px; border-radius: 6px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; margin-top: 10px; }
        .kit-img { width: 36px; height: 46px; object-fit: contain; margin-bottom: -2px; margin-top: 2px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
        .pill-name { font-size: 0.65rem; font-weight: 700; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; background: white; margin-top: 2px; padding: 1px 0; }
        .pill-data { font-size: 0.6rem; color: #555; font-weight: 500; display: flex; gap: 4px; justify-content: center; width: 100%; background: #f3f4f6; border-radius: 0 0 4px 4px; padding-bottom: 2px; }
        .points-badge { background: var(--primary); color: white; padding: 0 4px; border-radius: 3px; font-weight: 700; }
        .captain-badge { position: absolute; bottom: 30px; right: -4px; background: #111; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; z-index: 15; border: 1px solid white; }
        .vice-badge { background: #666; }
        
        /* TRANSFERS */
        .t-card { background: white; border-radius: 16px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .t-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #f9fafb; }
        .t-body { display: flex; position: relative; }
        .t-mid-arrow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: white; border: 1px solid var(--border); color: var(--text-sub); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; font-size: 0.8rem; }
        .t-half { flex: 1; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .t-out { background: #fff5f5; border-right: 1px solid #fee2e2; } 
        .t-in { background: #f0fdf4; }
        .rec-badge { background: #fbbf24; color: #78350f; font-size: 0.7rem; font-weight: 800; padding: 4px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
        .t-card.best-pick { border: 2px solid #fbbf24; transform: scale(1.02); }

        /* UTILS */
        .hidden { display: none !important; }
        .welcome-card { text-align: center; padding: 40px 20px; background: #fafafa; border-radius: 20px; border: 1px solid var(--border); margin-top: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; text-align: center; margin: 20px 0; outline: none; background: white; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(55,0,60,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Modal & FDR */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px); }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal-card { background: white; width: 100%; max-width: 600px; border-radius: 20px 20px 0 0; padding: 25px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.open .modal-card { transform: translateY(0); }
        .fdr-dot { width: 22px; height: 12px; font-size: 0.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; border-radius: 1px; color: rgba(0,0,0,0.6); }
        .bg-1 { background: #375523; color: white; } .bg-2 { background: #01fc7a; } .bg-3 { background: #e5e7eb; } .bg-4 { background: #ff1751; color: white; } .bg-5 { background: #80072d; color: white; }
        
        /* MATCH STATUS */
        .match-status { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 0.55rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; white-space: nowrap; z-index: 18; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .ms-live { background: #00ff85; color: #00381b; border: 1px solid #00e676; animation: pulseLive 2s infinite; }
        @keyframes pulseLive { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>

<body>
    <div id="playerModalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <div style="font-size:1.5rem; font-weight:800; color:var(--primary);" id="modalName">Player</div>
                <button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem;">×</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
                <div style="background:#f9fafb; padding:10px; border-radius:8px; text-align:center;">
                    <div style="font-size:0.6rem; text-transform:uppercase;">Form</div><div style="font-weight:800;" id="modalForm">0</div>
                </div>
                <div style="background:#f9fafb; padding:10px; border-radius:8px; text-align:center;">
                    <div style="font-size:0.6rem; text-transform:uppercase;">Points</div><div style="font-weight:800;" id="modalPts">0</div>
                </div>
                <div style="background:#f9fafb; padding:10px; border-radius:8px; text-align:center;">
                    <div style="font-size:0.6rem; text-transform:uppercase;">Price</div><div style="font-weight:800;" id="modalPrice">0</div>
                </div>
            </div>
            <div id="modalFixtures" style="display:flex; gap:5px; overflow-x:auto; padding-bottom:10px;"></div>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="app.toggleMenu()"></div>
    <div id="sideMenu" class="sidebar">
        <div class="menu-header">FPL Hub</div>
        <div class="menu-items">
            <div id="nav-squad" class="menu-item active" onclick="app.switchTool('squad')"><i class="fa-solid fa-shirt"></i> Squad</div>
            <div id="nav-transfers" class="menu-item" onclick="app.switchTool('transfers')"><i class="fa-solid fa-arrow-right-arrow-left"></i> Transfers</div>
        </div>
        <div class="menu-footer">
            <button class="logout-btn" onclick="localStorage.clear(); location.reload();"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="header-left">
                <div class="menu-btn" onclick="app.toggleMenu()"><i class="fa-solid fa-bars"></i></div>
                <div class="brand"><i class="fa-solid fa-bolt"></i> FPL Hub</div>
            </div>
            <div class="header-right">
                <div class="user-avatar" id="userIcon"><i class="fa-regular fa-user"></i></div>
            </div>
        </header>

        <div class="content">
            <div id="welcomeView" class="welcome-card">
                <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
                <h2>Link Team</h2>
                <p style="color: var(--text-sub);">Enter your Team ID</p>
                <input type="number" id="teamID" placeholder="e.g. 123456">
                <button class="btn" onclick="app.load()">Connect</button>
            </div>

            <div id="loadingView" class="welcome-card hidden">
                <div class="spinner"></div><p id="loadingMsg">Loading...</p>
            </div>

            <div id="dashboardView" class="hidden">
                <div class="scoreboard">
                    <div class="manager-name" id="dispName">...</div>
                    <div class="stats-grid">
                        <div><div class="stat-label">GW Points</div><div class="stat-val" id="dispGW">...</div></div>
                        <div><div class="stat-label">Total</div><div class="stat-val-small" id="dispTotal">...</div></div>
                        <div><div class="stat-label">Rank</div><div class="stat-val-small" id="dispRank">...</div></div>
                    </div>
                </div>

                <div class="pitch-wrapper">
                    <div class="budget-bar">
                        <span>Bank: <span class="budget-val" id="dispBank">£0.0m</span></span>
                    </div>
                    <div class="pitch-container">
                        <div id="pitchRows"></div>
                    </div>
                </div>
                <div style="background:white; border-radius:16px; border:1px solid var(--border); overflow:hidden;">
                    <div style="background:#f8f9fa; padding:8px 15px; font-size:0.7rem; font-weight:800; border-bottom:1px solid var(--border);">Bench</div>
                    <div id="benchRow" style="display:flex; justify-content:space-around; padding:15px;"></div>
                </div>
            </div>

            <div id="transfersView" class="hidden">
                <div id="transferContent"></div>
            </div>
        </div>
    </div>
    
    <script>
    const TransferBot = {
        // 1. Calculate a value for every player
        getScore: (p, fixMap) => {
            const fixtures = fixMap[p.team_id] || [];
            let fixScore = 0;
            // Get average difficulty of next 3 games
            const limit = Math.min(fixtures.length, 3);
            for(let i=0; i<limit; i++) fixScore += fixtures[i].diff;
            const avgDiff = limit > 0 ? fixScore / limit : 3;

            // GOD MODE FORMULA (Greedy Weighting)
            // Heavily favors Form and Good Fixtures
            let score = (parseFloat(p.form) * 5) + (parseFloat(p.ict_index) * 0.1) + (15 - (avgDiff * 3));
            
            // Penalties
            if (p.status !== 'a') score -= 50; // Injured/Suspended
            if (p.chance && p.chance < 75) score -= 50;

            return score;
        },

        // 2. Greedy Search: Outfield to Outfield only
        analyze: (myPicks, allPlayers, bank, fixMap, ftCount) => {
            const suggestions = [];

            // A. Identify Weakest Links (My Team) - IGNORE GK (Pos 1)
            const mySquad = myPicks.map(pick => {
                const p = allPlayers[pick.element];
                if (!p || p.pos === 1) return null; // Skip GK
                return { 
                    p: p, 
                    score: TransferBot.getScore(p, fixMap),
                    pick: pick 
                };
            }).filter(x => x).sort((a,b) => a.score - b.score); // Lowest score first

            // B. Identify Top Targets (Market) - IGNORE GK (Pos 1)
            // Filter: Must be active, same positions as our squad, reasonable form
            const market = Object.values(allPlayers)
                .filter(p => p.pos !== 1 && p.status === 'a' && parseFloat(p.form) > 0.5)
                .map(p => ({ p: p, score: TransferBot.getScore(p, fixMap) }))
                .sort((a,b) => b.score - a.score) // Highest score first
                .slice(0, 50); // Optimization: Only look at top 50

            // C. GREEDY LOOP: Find the single best swap available
            const potentialMoves = [];

            for (const sellObj of mySquad) {
                const sell = sellObj.p;
                const maxBudget = bank + sell.price;

                for (const buyObj of market) {
                    const buy = buyObj.p;

                    // RULES:
                    if (buy.pos !== sell.pos) continue; // Must be same position
                    if (buy.price > maxBudget) continue; // Must afford
                    if (myPicks.some(pk => pk.element === buy.id)) continue; // Can't buy own player

                    // Calculate Gain
                    const gain = (buyObj.score - sellObj.score).toFixed(1);
                    
                    if (parseFloat(gain) > 3.0) {
                        potentialMoves.push({
                            type: 'Greedy Upgrade',
                            out: [sell],
                            in: [buy],
                            diff: parseFloat(gain)
                        });
                    }
                }
            }

            // Sort moves by highest Gain
            potentialMoves.sort((a,b) => b.diff - a.diff);

            // Return Top 3 Unique Moves
            return potentialMoves.slice(0, 3);
        }
    };
    
    const app = {
        data: { user: null, picks: [], players: {}, fixtures: {}, status: {}, stats: {} },
        view: 'dashboard',

        fetchUrl: async (url) => {
            const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
            try {
                const r = await fetch(proxy);
                if (!r.ok) throw new Error('API Error');
                return await r.json();
            } catch (e) {
                // Fallback Proxy if first fails
                const backup = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const r2 = await fetch(backup);
                return await r2.json();
            }
        },

        load: async () => {
            const id = document.getElementById('teamID').value || localStorage.getItem('fpl_id');
            if (!id) return alert("Please enter a Team ID");
            
            app.show('loadingView');
            localStorage.setItem('fpl_id', id);

            try {
                // 1. Fetch Static Data (Players, Teams)
                const staticData = await app.fetchUrl('https://fantasy.premierleague.com/api/bootstrap-static/');
                
                // 2. Fetch User Data
                const user = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/`);
                const history = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/history/`);
                
                // 3. Determine Current GW
                const currentEvent = staticData.events.find(e => e.is_current) || staticData.events[0];
                const gw = currentEvent.id;

                // 4. Fetch Picks & Live Stats
                const picksData = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/event/${gw}/picks/`);
                const liveData = await app.fetchUrl(`https://fantasy.premierleague.com/api/event/${gw}/live/`);

                // 5. SAFE FIXTURE FETCHING (Prevents crash at end of season)
                const gwsToFetch = [gw];
                if (gw < 38) gwsToFetch.push(gw + 1);
                if (gw < 37) gwsToFetch.push(gw + 2);
                
                const fixReqs = gwsToFetch.map(g => app.fetchUrl(`https://fantasy.premierleague.com/api/fixtures/?event=${g}`));
                const fixResults = await Promise.all(fixReqs);
                
                // 6. Process Data
                app.processData(staticData, user, picksData, liveData, fixResults, history);
                app.renderSquad();

            } catch (err) {
                console.error(err);
                alert("Could not load data. FPL API or Proxy may be down.");
                app.show('welcomeView');
            }
        },

        processData: (staticData, user, picksData, liveData, fixResults, history) => {
            const teamMap = {};
            staticData.teams.forEach(t => teamMap[t.id] = t.short_name);

            // Map Live Points
            const liveMap = {};
            liveData.elements.forEach(el => liveMap[el.id] = el.stats);

            // Map Fixtures
            const fixMap = {};
            // Flatten all fetched fixtures
            const allFix = fixResults.flat();
            allFix.forEach(f => {
                if(!fixMap[f.team_h]) fixMap[f.team_h] = [];
                if(!fixMap[f.team_a]) fixMap[f.team_a] = [];
                fixMap[f.team_h].push({ diff: f.team_h_difficulty, opp: teamMap[f.team_a] });
                fixMap[f.team_a].push({ diff: f.team_a_difficulty, opp: teamMap[f.team_h] });
            });

            // Map Players
            const players = {};
            staticData.elements.forEach(p => {
                const live = liveMap[p.id];
                players[p.id] = {
                    id: p.id, name: p.web_name, team_id: p.team, pos: p.element_type,
                    price: p.now_cost / 10, form: p.form, ict_index: p.ict_index,
                    status: p.status, chance: p.chance_of_playing_next_round,
                    team_code: p.team_code,
                    event_points: live ? live.total_points : p.event_points,
                    minutes: live ? live.minutes : 0
                };
            });

            // Match Status (Live/FT)
            const statusMap = {};
            (fixResults[0] || []).forEach(f => {
                let s = 'FIX';
                if(f.started) s = 'LIVE';
                if(f.finished_provisional) s = 'FT';
                statusMap[f.team_h] = s; statusMap[f.team_a] = s;
            });

            app.data = {
                user: user, picks: picksData.picks, players: players,
                fixtures: fixMap, status: statusMap, 
                stats: { bank: picksData.entry_history.bank / 10, rank: user.summary_overall_rank },
                history: history
            };
        }
    };
    
    // EXTEND APP OBJECT (Render Logic)
    app.show = (id) => {
        ['welcomeView', 'loadingView', 'dashboardView', 'transfersView'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    app.toggleMenu = () => {
        document.getElementById('sideMenu').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('open');
    };

    app.switchTool = (tool) => {
        app.toggleMenu();
        if(tool === 'squad') {
            app.renderSquad();
        } else {
            app.renderTransfers();
        }
    };

    app.renderSquad = () => {
        app.show('dashboardView');
        const d = app.data;
        
        // 1. Header Stats
        let liveScore = 0;
        d.picks.forEach(p => {
             // Basic calc: if multiplier > 0 (playing), add points
             liveScore += (d.players[p.element].event_points * p.multiplier);
        });
        document.getElementById('dispName').innerText = d.user.name;
        document.getElementById('dispGW').innerText = liveScore;
        document.getElementById('dispTotal').innerText = d.user.summary_overall_points + (liveScore - d.user.summary_event_points);
        document.getElementById('dispRank').innerText = d.user.summary_overall_rank ? d.user.summary_overall_rank.toLocaleString() : '-';
        document.getElementById('dispBank').innerText = `£${d.stats.bank}m`;

        // 2. Pitch
        const pitch = document.getElementById('pitchRows');
        const bench = document.getElementById('benchRow');
        pitch.innerHTML = ''; bench.innerHTML = '';

        // Separate by Position
        const formation = {1:[], 2:[], 3:[], 4:[]};
        const benchList = [];

        d.picks.forEach(pick => {
            const p = d.players[pick.element];
            if(pick.multiplier > 0 && pick.position <= 11) {
                formation[p.pos].push({ ...p, ...pick });
            } else {
                benchList.push({ ...p, ...pick });
            }
        });

        // Draw Field
        [1,2,3,4].forEach(pos => {
            const row = document.createElement('div');
            row.className = 'field-row';
            formation[pos].forEach(p => row.innerHTML += app.createPill(p));
            pitch.appendChild(row);
        });

        // Draw Bench
        benchList.forEach(p => bench.innerHTML += app.createPill(p));
    };

    app.createPill = (p) => {
        const fix = (app.data.fixtures[p.team_id] || []).slice(0,3);
        let dots = '<div style="display:flex; gap:1px; margin-top:2px;">';
        fix.forEach(f => dots += `<div class="fdr-dot bg-${f.diff}"></div>`);
        dots += '</div>';

        const matchStatus = app.data.status[p.team_id];
        let statusBadge = matchStatus === 'LIVE' ? `<div class="match-status ms-live">${p.minutes}'</div>` : '';
        
        return `
        <div class="player-pill" onclick="openModal(${p.id})">
            ${statusBadge}
            <img src="https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${p.team_code}-66.png" class="kit-img">
            <div class="pill-name">${p.name}</div>
            <div class="pill-data">
                <span>£${p.price}</span><span class="points-badge">${p.event_points * p.multiplier}</span>
            </div>
            ${dots}
        </div>`;
    };

    app.renderTransfers = () => {
        app.show('transfersView');
        const container = document.getElementById('transferContent');
        container.innerHTML = '<div class="spinner"></div><p style="text-align:center">Finding optimal outfield moves...</p>';

        // Run TransferBot (Greedy)
        setTimeout(() => {
            const suggestions = TransferBot.analyze(app.data.picks, app.data.players, app.data.stats.bank, app.data.fixtures, 1);
            let html = '<div class="welcome-card" style="margin-top:0;"><h3>💰 Greedy Scout</h3><p>Best Outfield Swaps</p></div>';

            if(suggestions.length === 0) {
                html += '<div style="text-align:center; padding:20px;">No transfers found that improve your score significantly.</div>';
            } else {
                suggestions.forEach(s => {
                    const outP = s.out[0];
                    const inP = s.in[0];
                    
                    html += `
                    <div class="t-card ${suggestions.indexOf(s)===0 ? 'best-pick' : ''}">
                        <div class="t-header">
                            <div><span class="t-type">Outfield Swap</span> ${suggestions.indexOf(s)===0 ? '<span class="rec-badge">BEST</span>' : ''}</div>
                            <div style="font-weight:800; color:var(--accent); background:var(--primary); padding:2px 8px; border-radius:4px;">+${s.diff} Val</div>
                        </div>
                        <div class="t-body">
                            <div class="t-mid-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                            <div class="t-half t-out">
                                <div style="font-size:0.6rem; color:#ef4444; font-weight:800;">OUT</div>
                                <img src="https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${outP.team_code}-66.png" style="width:40px;">
                                <div style="font-size:0.8rem; font-weight:700;">${outP.name}</div>
                                <div style="font-size:0.7rem;">£${outP.price}m</div>
                            </div>
                            <div class="t-half t-in">
                                <div style="font-size:0.6rem; color:#16a34a; font-weight:800;">IN</div>
                                <img src="https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${inP.team_code}-66.png" style="width:40px;">
                                <div style="font-size:0.8rem; font-weight:700;">${inP.name}</div>
                                <div style="font-size:0.7rem;">£${inP.price}m</div>
                            </div>
                        </div>
                    </div>`;
                });
            }
            container.innerHTML = html;
        }, 100);
    };

    // UTILS
    function openModal(id) {
        const p = app.data.players[id];
        document.getElementById('modalName').innerText = p.name;
        document.getElementById('modalForm').innerText = p.form;
        document.getElementById('modalPts').innerText = p.event_points;
        document.getElementById('modalPrice').innerText = p.price;
        document.getElementById('playerModalOverlay').classList.add('open');
    }
    function closeModal() { document.getElementById('playerModalOverlay').classList.remove('open'); }
    
    // Check for saved login
    const saved = localStorage.getItem('fpl_id');
    if(saved) { document.getElementById('teamID').value = saved; }

    </script>
</body>
</html>
