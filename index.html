<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sideMenu" class="sidebar">
        <div class="menu-header">FPL Hub</div>
        <div class="menu-item active" onclick="switchTool('squad')"><i class="fa-solid fa-shirt"></i> Squad</div>
        <div class="menu-item" onclick="switchTool('transfers')"><i class="fa-solid fa-arrow-right-arrow-left"></i> Suggestions</div>
        <div class="menu-footer">
            <div class="reset-btn" onclick="clearData()"><i class="fa-solid fa-power-off"></i> Logout</div>
        </div>
    </div>
    <div id="menuOverlay" class="overlay" onclick="toggleMenu()"></div>

    <div class="app-container">
        <header>
            <div class="header-left">
                <i class="fa-solid fa-bars menu-btn" onclick="toggleMenu()"></i>
                <div class="brand"><i class="fa-solid fa-bolt" style="color:var(--accent)"></i> Dashboard</div>
            </div>
            <div class="user-avatar" id="userIcon"><i class="fa-regular fa-user"></i></div>
        </header>

        <div class="content">
            <div id="welcomeView" class="card-center hidden">
                <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
                <h2>Link Team</h2>
                <input type="number" id="teamID" placeholder="e.g. 123456">
                <button class="btn" onclick="app.load()">Connect</button>
            </div>

            <div id="loadingView" class="card-center hidden" style="text-align:center;">
                <div class="spinner"></div>
                <p id="loadingMsg" style="color: var(--text-sub); margin-top: 15px;">Connecting...</p>
            </div>

            <div id="dashboardView" class="hidden">
                <div class="scoreboard">
                    <div><div class="sb-label">Manager</div><div class="sb-manager" id="dispName">...</div></div>
                    <div class="sb-stats">
                        <div><div class="sb-label">GW</div><div class="sb-val" id="dispGW">...</div></div>
                        <div><div class="sb-label">Total</div><div class="sb-val" style="color:white" id="dispTotal">...</div></div>
                        <div><div class="sb-label">Rank</div><div class="sb-val" style="color:white; font-size:1.1rem;" id="dispRank">...</div></div>
                    </div>
                </div>

                <div class="pitch-wrapper">
                    <div class="budget-bar">
                        <span>Bank: <span style="color:var(--primary); font-weight:800;" id="dispBank">£0.0m</span></span>
                        <span>Value: <span style="color:var(--primary); font-weight:800;" id="dispValue">£0.0m</span></span>
                    </div>
                    <div class="pitch-container">
                        <div class="pitch-lines"><div class="p-mid"></div><div class="p-circ"></div><div class="p-box-t"></div><div class="p-box-b"></div></div>
                        <div id="pitchRows"></div>
                    </div>
                </div>

                <div class="bench-wrapper">
                    <div class="bench-header">Substitutes</div>
                    <div id="benchRow" class="bench-row"></div>
                </div>
            </div>

            <div id="transfersView" class="card-center hidden">
                <div style="font-size: 2.5rem; margin-bottom: 15px;">🔮</div>
                <h2>Transfer Hub</h2>
                <p>Coming next...</p>
            </div>
        </div>
    </div>

    <div id="playerModalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 id="modalName" style="color:var(--primary); font-size:1.3rem; margin:0;">...</h3>
                <i class="fa-solid fa-xmark" style="font-size:1.2rem; cursor:pointer;" onclick="closeModal()"></i>
            </div>
            <div id="modalNews" style="background:#fff3cd; color:#856404; padding:10px; border-radius:8px; font-size:0.85rem; margin-bottom:15px; display:none;"></div>
            <div style="font-size:0.9rem; color:#666; margin-bottom:15px;" id="modalInfo">...</div>
            <div style="font-weight:700; color:#888; font-size:0.75rem; text-transform:uppercase; margin-bottom:10px;">Upcoming</div>
            <div id="modalFixtures" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;"></div>
        </div>
    </div>

    <script src="squad.js"></script>

    <script>
        const MOCK={user:{name:"Demo Manager",summary_overall_points:950,summary_event_points:45,summary_overall_rank:125000},bank:5,value:1024,picks:[{element:1,position:1},{element:2,position:2},{element:3,position:3},{element:4,position:4},{element:5,position:5,is_vice_captain:true},{element:6,position:6},{element:7,position:7},{element:8,position:8},{element:9,position:9,is_captain:true},{element:10,position:10},{element:11,position:11},{element:12,position:12},{element:13,position:13},{element:14,position:14},{element:15,position:15}],players:{9:{web_name:"Haaland",team_code:43,pos:4,price:14.0,event_points:13,status:'d',news:"Knock",team:"MCI",sel:70},5:{web_name:"Salah",team_code:14,pos:3,price:13.0,event_points:12,status:'a',team:"LIV",sel:45},1:{web_name:"Pickford",team_code:11,pos:1,price:4.5,event_points:6,status:'a',team:"EVE",sel:15},2:{web_name:"Trent",team_code:14,pos:2,price:8.0,event_points:2,team:"LIV"},3:{web_name:"Saliba",team_code:3,pos:2,price:5.5,event_points:6,team:"ARS"},4:{web_name:"Porro",team_code:6,pos:2,price:5.0,event_points:1,team:"TOT"},6:{web_name:"Saka",team_code:3,pos:3,price:9.0,event_points:8,team:"ARS"},7:{web_name:"Palmer",team_code:8,pos:3,price:6.0,event_points:10,team:"CHE"},8:{web_name:"Gordon",team_code:4,pos:3,price:6.5,event_points:5,team:"NEW"},10:{web_name:"Watkins",team_code:7,pos:4,price:8.5,event_points:2,team:"AVL"},11:{web_name:"Isak",team_code:4,pos:4,price:7.5,event_points:8,team:"NEW"},12:{web_name:"Areola",team_code:21,pos:1,price:4.0,event_points:0,team:"WHU"},13:{web_name:"Burn",team_code:4,pos:2,price:4.5,event_points:0,team:"NEW"},14:{web_name:"Rogers",team_code:7,pos:3,price:5.0,event_points:2,team:"AVL"},15:{web_name:"Archer",team_code:20,pos:4,price:4.5,event_points:1,team:"SOU"}},fixtures:{9:{opp:"LIV",diff:5,is_home:true}}};

        const app = {
            currentTool: 'squad', playersCache: {},
            
            init: () => {
                const savedId = localStorage.getItem('fpl_id_final');
                if(savedId) { document.getElementById('userIcon').classList.add('active'); document.getElementById('teamID').value = savedId; app.load(savedId); } 
                else app.show('welcomeView');
            },

            show: (viewId) => {
                ['welcomeView', 'loadingView', 'dashboardView', 'transfersView'].forEach(v => document.getElementById(v).classList.add('hidden'));
                document.getElementById(viewId).classList.remove('hidden');
                
                // If switching to dashboard, ensure grid/flex display is set correctly
                if (viewId === 'dashboardView') {
                    document.getElementById('dashboardView').style.display = (window.innerWidth >= 1024) ? 'grid' : 'flex';
                }
            },

            toggleMenu: () => { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('menuOverlay').classList.toggle('open'); },
            
            switchTool: (t) => {
                toggleMenu(); app.currentTool = t;
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                if (t === 'squad') {
                    if(Object.keys(app.playersCache).length > 0) app.show('dashboardView');
                    else app.load(localStorage.getItem('fpl_id_final'));
                } else app.show('transfersView');
            },

            fetchUrl: async (targetUrl) => {
                const proxies = [(url) => `https://corsproxy.io/?${encodeURIComponent(url)}`, (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
                for (let i = 0; i < proxies.length; i++) {
                    try {
                        const c = new AbortController(); const id = setTimeout(() => c.abort(), 8000);
                        const r = await fetch(proxies[i](targetUrl), { signal: c.signal }); clearTimeout(id);
                        if(r.ok) return await r.json();
                    } catch (e) {}
                }
                throw new Error("Failed");
            },

            load: async (savedId = null) => {
                const id = savedId || document.getElementById('teamID').value;
                if(!id) return alert("Enter ID");
                localStorage.setItem('fpl_id_final', id);
                document.getElementById('userIcon').classList.add('active');
                app.show('loadingView');

                try {
                    document.getElementById('loadingMsg').innerText = "Connecting...";
                    const staticData = await app.fetchUrl('https://fantasy.premierleague.com/api/bootstrap-static/');
                    const user = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/`);
                    const gw = staticData.events.find(e => e.is_current)?.id || 1;
                    const picks = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/event/${gw}/picks/`);
                    const fixtures = await app.fetchUrl(`https://fantasy.premierleague.com/api/fixtures/?event=${gw}`);
                    
                    const fixMap = {};
                    const teamShort = {};
                    staticData.teams.forEach(t => teamShort[t.id] = t.short_name);
                    fixtures.forEach(f => {
                        fixMap[f.team_h] = { opp: teamShort[f.team_a], diff: f.team_h_difficulty, is_home: true };
                        fixMap[f.team_a] = { opp: teamShort[f.team_h], diff: f.team_a_difficulty, is_home: false };
                    });

                    const players = {};
                    staticData.elements.forEach(p => {
                        players[p.id] = {
                            id: p.id, name: p.web_name, team: teamShort[p.team], team_id: p.team,
                            pos: p.element_type, price: p.now_cost / 10, event_points: p.event_points,
                            team_code: p.team_code, status: p.status, news: p.news, sel: parseFloat(p.selected_by_percent), form: p.form
                        };
                    });
                    
                    app.playersCache = players;
                    document.getElementById('demoAlert').classList.add('hidden');
                    
                    // --- CALL THE SQUAD RENDERER ---
                    SquadRenderer.render(user, picks.picks, players, fixMap, picks.entry_history);

                } catch (error) {
                    document.getElementById('demoAlert').classList.remove('hidden');
                    const mPlayers = {}; 
                    Object.keys(MOCK.players).forEach(k => mPlayers[k] = {...MOCK.players[k], id:k, team:'MOCK'});
                    app.playersCache = mPlayers;
                    
                    setTimeout(() => { 
                        // --- CALL MOCK RENDER ---
                        SquadRenderer.render(MOCK.user, MOCK.picks, mPlayers, MOCK.fixtures, {bank:5, value:1000}); 
                    }, 500);
                }
            },

            openModal: async (playerId) => {
                const p = app.playersCache[playerId];
                document.getElementById('modalName').innerText = p.name;
                document.getElementById('modalInfo').innerText = `${p.team} • £${p.price}m • Sel: ${p.sel}%`;
                const newsEl = document.getElementById('modalNews');
                if(p.news) { newsEl.style.display='block'; newsEl.innerText=p.news; } else newsEl.style.display='none';
                
                document.getElementById('modalOverlay').classList.add('open');
                document.getElementById('playerModal').classList.add('open');
                
                try {
                    const data = await app.fetchUrl(`https://fantasy.premierleague.com/api/element-summary/${playerId}/`);
                    let html = '';
                    data.fixtures.slice(0,5).forEach(f => {
                        html += `<div style="min-width:65px; border:1px solid #eee; border-radius:6px; padding:6px; text-align:center;">
                            <div style="font-size:0.6rem; color:#666;">GW${f.event}</div>
                            <div style="font-weight:700; color:${f.difficulty>3?'red':'green'}">${f.difficulty}</div>
                        </div>`;
                    });
                    document.getElementById('modalFixtures').innerHTML = html;
                } catch(e){}
            }
        };

        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('menuOverlay').classList.toggle('open'); }
        function switchTool(t) { toggleMenu(); app.switchTool(t); }
        function clearData() { if(confirm("Logout?")) { localStorage.removeItem('fpl_id_final'); location.reload(); } }
        function closeModal() { document.getElementById('playerModal').classList.remove('open'); document.getElementById('modalOverlay').classList.remove('open'); }

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
