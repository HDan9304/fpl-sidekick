<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Sidekick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom FPL Gradient & Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }
        
        /* FPL Brand Colors */
        .fpl-purple { background-color: #37003c; }
        .fpl-green { color: #00ff85; }
        .fpl-green-bg { background-color: #00ff85; }
        
        /* Glassmorphism Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <nav class="fpl-purple text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-shirt text-2xl fpl-green"></i>
                <h1 class="text-xl font-bold tracking-tight">FPL <span class="fpl-green">Sidekick</span></h1>
            </div>
            <button class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div class="fpl-purple rounded-2xl p-6 text-white shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#00ff85] rounded-full opacity-20 blur-2xl"></div>
            
            <p class="text-sm text-gray-300 font-medium uppercase tracking-wider">Next Deadline</p>
            <h2 class="text-3xl font-bold mt-1">Gameweek 15</h2>
            <div class="mt-4 flex gap-4">
                <div class="bg-white/10 backdrop-blur-md rounded-lg p-3 text-center min-w-[70px]">
                    <span class="block text-2xl font-bold fpl-green" id="days">02</span>
                    <span class="text-xs text-gray-300">Days</span>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-lg p-3 text-center min-w-[70px]">
                    <span class="block text-2xl font-bold fpl-green" id="hours">14</span>
                    <span class="text-xs text-gray-300">Hrs</span>
                </div>
            </div>
            <p class="mt-4 text-xs text-gray-400">Sat 28 Dec, 11:00 AM</p>
        </div>

        <div>
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-lg font-bold text-gray-800">Scout Recommendations</h3>
                <a href="#" class="text-sm text-purple-700 font-semibold">View all</a>
            </div>

            <div id="player-grid" class="grid grid-cols-1 gap-4">
                </div>
        </div>

    </main>

    <script>
        // 1. MOCK DATA (Simulating the API for now)
        const mockPlayers = [
            { 
                name: "Erling Haaland", 
                team: "MCI", 
                position: "FWD", 
                price: "£14.3m", 
                points: 112, 
                form: "8.5",
                difficulty: 2 // Green fixture
            },
            { 
                name: "Mohamed Salah", 
                team: "LIV", 
                position: "MID", 
                price: "£13.1m", 
                points: 125, 
                form: "9.2",
                difficulty: 3 // Grey fixture
            },
            { 
                name: "Cole Palmer", 
                team: "CHE", 
                position: "MID", 
                price: "£10.8m", 
                points: 98, 
                form: "7.1",
                difficulty: 4 // Red fixture
            }
        ];

        // 2. RENDER FUNCTION
        function renderPlayers() {
            const grid = document.getElementById('player-grid');
            let html = '';

            mockPlayers.forEach(player => {
                // Determine difficulty color
                let difficultyColor = 'bg-gray-200 text-gray-600';
                if(player.difficulty <= 2) difficultyColor = 'bg-green-100 text-green-700';
                if(player.difficulty >= 4) difficultyColor = 'bg-red-100 text-red-700';

                html += `
                <div class="glass-card p-4 flex items-center justify-between cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-100 to-purple-200 flex items-center justify-center text-purple-700 font-bold text-lg border-2 border-white shadow-sm">
                            ${player.position.substring(0,1)}
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-800">${player.name}</h4>
                            <div class="flex items-center gap-2 text-xs mt-1">
                                <span class="bg-slate-200 px-2 py-0.5 rounded text-slate-600 font-semibold">${player.team}</span>
                                <span class="${difficultyColor} px-2 py-0.5 rounded font-semibold">Next: FDR ${player.difficulty}</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block text-sm font-bold text-purple-900">${player.price}</span>
                        <span class="text-xs text-gray-500">Pts: ${player.points}</span>
                    </div>
                </div>
                `;
            });

            grid.innerHTML = html;
        }

        // 3. INITIALIZE
        document.addEventListener('DOMContentLoaded', () => {
            renderPlayers();
            console.log("FPL Sidekick Loaded");
        });
    </script>
</body>
</html>
