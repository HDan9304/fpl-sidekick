<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Scout</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo-area">
                <i class="fa-solid fa-shield-halved"></i> FPL Scout
            </div>
            <p>Team Analyzer</p>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="input-container">
                <i class="fa-solid fa-user-tag input-icon"></i>
                <input type="number" id="teamID" placeholder="Enter Team ID...">
            </div>
            
            <button id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i> Find Team
            </button>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Scouting Database...</p>
            </div>

            <div id="result" class="hidden">
                </div>
        </div>
    </main>

    <footer>
        <p>Data via FPL API <i class="fa-solid fa-bolt"></i> Not official</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
