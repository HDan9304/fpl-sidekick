<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Hub Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #37003c;
            --accent: #00ff85;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-main: #111;
            --text-sub: #666;
            --border: #eee;
            --red: #e90052;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text-main); padding-bottom: 80px; overflow-x: hidden; }

        /* --- NAV BAR --- */
        nav {
            background: var(--surface);
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 60px;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; height: 100%; }

        .menu-btn {
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            padding: 10px;
            margin-left: -10px; /* Aligns visually */
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--accent); }

        .user-btn {
            background: var(--bg); border: 1px solid var(--border);
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary); transition: 0.2s;
        }
        .user-btn.linked { background: var(--primary); color: var(--accent); border: none; }

        /* --- SIDEBAR MENU --- */
        .sidebar {
            position: fixed; top: 0; left: 0; height: 100%; width: 260px;
            background: var(--surface); z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }

        .menu-header {
            padding: 20px; height: 60px;
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            font-weight: 800; color: var(--primary);
            font-size: 1.1rem;
        }

        .menu-items { flex: 1; padding-top: 10px; }

        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 15px 20px;
            color: var(--text-sub);
            font-weight: 500;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: 0.2s;
        }
        .menu-item:hover { background: var(--bg); color: var(--primary); }
        .menu-item.active {
            color: var(--primary);
            background: rgba(55, 0, 60, 0.04);
            border-left-color: var(--primary);
            font-weight: 700;
        }
        
        /* Reset Button area */
        .menu-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .reset-link {
            color: var(--red); font-size: 0.85rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 150;
            opacity: 0; visibility: hidden; transition: 0.3s;
            backdrop-filter: blur(2px);
        }
        .menu-overlay.open { opacity: 1; visibility: visible; }


        /* --- LAYOUT --- */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; min-height: 80vh; }

        .box {
            text-align: center; padding: 40px 20px;
            background: var(--surface); border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-top: 20px;
        }
        
        .cta-btn {
            background: var(--primary); color: white;
            padding: 12px 24px; border-radius: 8px;
            border: none; font-weight: 600; cursor: pointer; width: 100%;
        }

        /* --- DASHBOARD --- */
        .dashboard-header {
            background: var(--primary); color: white;
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(55, 0, 60, 0.2);
        }
        .manager-rank {
            display: inline-block; background: rgba(255,255,255,0.1);
            padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 8px;
        }

        .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-sub); margin-bottom: 8px; letter-spacing: 1px; }
        
        .player-card {
            background: var(--surface); padding: 12px;
            border-radius: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border);
        }

        .p-left { display: flex; align-items: center; gap: 10px; }
        .pos-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .pos-GK { background: #eab308; }
        .pos-DEF { background: #3b82f6; }
        .pos-MID { background: #22c55e; }
        .pos-FWD { background: #ef4444; }

        .p-name { font-weight: 600; font-size: 0.9rem; }
        .p-team { font-size: 0.7rem; color: var(--text-sub); }
        .p-price { font-weight: 600; color: var(--primary); font-size: 0.85rem; }

        .chip { padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; margin-left: 6px; }
        .chip-cold { background: #fee2e2; color: #dc2626; }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: flex; justify-content: center; align-items: center; backdrop-filter: blur(3px);
        }
        .modal { background: var(--surface); padding: 25px; width: 85%; max-width: 350px; border-radius: 16px; text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }
        .link-actions { display: flex; gap: 10px; }
        .btn-secondary { background: transparent; color: var(--text-sub); border: 1px solid var(--border); }

        .hidden { display: none !important; }
        .loading-spinner {
            border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid var(--primary);
            border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
            <div class="logo"><i class="fa-solid fa-bolt"></i> FPL Hub</div>
        </div>
        <div class="user-btn" id="userIcon" onclick="toggleUserModal()">
            <i class="fa-regular fa-user"></i>
        </div>
    </nav>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="sidebar">
        <div class="menu-header">FPL Hub Tools</div>
        
        <div class="menu-items">
            <div class="menu-item active" onclick="switchTool('squad')">
                <i class="fa-solid fa-shirt"></i> Squad
            </div>

            <div class="menu-item" style="opacity:0.5; cursor: default;">
                <i class="fa-solid fa-arrow-right-arrow-left"></i> Transfers
            </div>
            <div class="menu-item" style="opacity:0.5; cursor: default;">
                <i class="fa-solid fa-chart-line"></i> Price Changes
            </div>
        </div>

        <div class="menu-footer">
            <div class="reset-link" onclick="fullReset()">
                <i class="fa-solid fa-trash"></i> Reset App
            </div>
        </div>
    </div>

    <div class="container">
        
        <div id="welcomeView" class="box hidden">
            <div style="font-size: 3rem; margin-bottom: 15px;">🚀</div>
            <h2>FPL Fast View</h2>
            <p>Link your ID once. Load your team instantly.</p>
            <button class="cta-btn" onclick="toggleUserModal()">Link Team ID</button>
        </div>

        <div id="loadingView" class="box hidden">
            <div class="loading-spinner"></div>
            <p style="margin-top: 15px; font-size: 0.9rem;">Connecting to Premier League...</p>
        </div>
        
        <div id="errorView" class="box hidden">
            <div style="font-size: 2rem; margin-bottom: 10px;">⚠️</div>
            <h3>Connection Error</h3>
            <p style="margin-bottom: 20px;">Could not load team data.</p>
            <button class="cta-btn" onclick="App.init()">Try Again</button>
        </div>

        <div id="dashboardView" class="hidden">
            <div class="dashboard-header">
                <h1 id="managerName" style="font-size: 1.4rem;">...</h1>
                <div class="manager-rank" id="managerPoints">Loading stats...</div>
            </div>

            <div class="section-label">Starting XI</div>
            <div id="startingList"></div>

            <div class="section-label" style="margin-top: 25px;">Bench</div>
            <div id="benchList"></div>
        </div>

    </div>

    <div id="linkModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Link Team</h3>
            <input type="number" id="idInput" placeholder="Team ID (e.g. 123456)">
            <div class="link-actions">
                <button class="cta-btn btn-secondary" onclick="toggleUserModal()">Cancel</button>
                <button class="cta-btn" onclick="saveId()">Save</button>
            </div>
            <div id="unlinkArea" class="hidden" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee;">
                <button onclick="unlinkTeam()" style="color: var(--red); background: none; border: none; font-weight: 600;">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const CACHE_KEY = 'fpl_static_data_v2';
        const CACHE_TIME_KEY = 'fpl_static_ts_v2';
        const CACHE_DURATION = 30 * 60 * 1000; 

        const App = {
            id: null,
            init: () => {
                const savedId = localStorage.getItem('fpl_team_id');
                if (savedId) {
                    App.id = savedId;
                    App.renderUserIcon(true);
                    App.fetchData(savedId);
                } else {
                    App.showView('welcome');
                    App.renderUserIcon(false);
                }
            },

            showView: (viewName) => {
                const views = ['welcomeView', 'loadingView', 'dashboardView', 'errorView'];
                views.forEach(id => document.getElementById(id).classList.add('hidden'));
                
                const target = document.getElementById(viewName);
                if(target) target.classList.remove('hidden');
            },

            renderUserIcon: (isLinked) => {
                const btn = document.getElementById('userIcon');
                const unlinkArea = document.getElementById('unlinkArea');
                if (isLinked) {
                    btn.classList.add('linked');
                    btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                    unlinkArea.classList.remove('hidden');
                    document.getElementById('idInput').value = App.id;
                } else {
                    btn.classList.remove('linked');
                    btn.innerHTML = '<i class="fa-regular fa-user"></i>';
                    unlinkArea.classList.add('hidden');
                    document.getElementById('idInput').value = '';
                }
            },

            fetchData: async (id) => {
                App.showView('loading');

                try {
                    let staticData = null;
                    const now = new Date().getTime();

                    // 1. Static Data Cache Strategy
                    const cachedData = localStorage.getItem(CACHE_KEY);
                    const cachedTime = localStorage.getItem(CACHE_TIME_KEY);

                    if (cachedData && cachedTime && (now - cachedTime < CACHE_DURATION)) {
                        staticData = JSON.parse(cachedData);
                    } else {
                        const staticRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://fantasy.premierleague.com/api/bootstrap-static/')}`);
                        if (!staticRes.ok) throw new Error("Proxy Error");
                        const staticRaw = await staticRes.json();
                        staticData = JSON.parse(staticRaw.contents);
                        localStorage.setItem(CACHE_KEY, JSON.stringify(staticData));
                        localStorage.setItem(CACHE_TIME_KEY, now);
                    }

                    // 2. Prepare Maps
                    const playerMap = {};
                    staticData.elements.forEach(p => {
                        playerMap[p.id] = {
                            name: p.web_name,
                            team: staticData.teams.find(t => t.id === p.team).short_name,
                            pos: p.element_type,
                            price: p.now_cost / 10,
                            form: parseFloat(p.form)
                        };
                    });
                    const gw = staticData.events.find(e => e.is_current)?.id || 1;

                    // 3. User Data Fetch
                    const [entryRaw, picksRaw] = await Promise.all([
                        fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://fantasy.premierleague.com/api/entry/${id}/`)}`).then(r => r.json()),
                        fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://fantasy.premierleague.com/api/entry/${id}/event/${gw}/picks/`)}`).then(r => r.json())
                    ]);

                    if(!entryRaw.contents || !picksRaw.contents) throw new Error("Empty Data");

                    const entryData = JSON.parse(entryRaw.contents);
                    const picksData = JSON.parse(picksRaw.contents);

                    App.renderDashboard(entryData, picksData, playerMap);

                } catch (error) {
                    console.error(error);
                    App.showView('errorView');
                }
            },

            renderDashboard: (user, picks, players) => {
                document.getElementById('managerName').innerText = user.name;
                document.getElementById('managerPoints').innerText = `${user.summary_overall_points} pts`;

                const startList = document.getElementById('startingList');
                const benchList = document.getElementById('benchList');
                startList.innerHTML = '';
                benchList.innerHTML = '';

                const getPosClass = (type) => {
                    if (type === 1) return 'pos-GK';
                    if (type === 2) return 'pos-DEF';
                    if (type === 3) return 'pos-MID';
                    return 'pos-FWD';
                };

                picks.picks.forEach((pick, index) => {
                    const p = players[pick.element];
                    let badge = '';
                    if (index < 11 && p.form < 2.5) {
                        badge = `<span class="chip chip-cold"><i class="fa-regular fa-snowflake"></i> ${p.form}</span>`;
                    }

                    const html = `
                        <div class="player-card">
                            <div class="p-left">
                                <div class="pos-dot ${getPosClass(p.pos)}"></div>
                                <div>
                                    <div class="p-name">${p.name} ${badge}</div>
                                    <div class="p-team">${p.team}</div>
                                </div>
                            </div>
                            <div class="p-price">£${p.price}</div>
                        </div>
                    `;

                    if (index < 11) startList.innerHTML += html;
                    else benchList.innerHTML += html;
                });

                App.showView('dashboard');
            }
        };

        // --- MENU LOGIC ---
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
                overlay.classList.remove('open');
            } else {
                menu.classList.add('open');
                overlay.classList.add('open');
            }
        }

        function switchTool(toolName) {
            toggleMenu(); // Close menu
            
            if (toolName === 'squad') {
                if (App.id) {
                    // FIX: If the list is empty, force a reload!
                    if(document.getElementById('startingList').innerHTML === '') {
                        App.fetchData(App.id);
                    } else {
                        App.showView('dashboard');
                    }
                } else {
                    App.showView('welcome');
                }
            }
        }

        function fullReset() {
            localStorage.clear();
            location.reload();
        }

        // --- USER MODAL LOGIC ---
        function toggleUserModal() { document.getElementById('linkModal').classList.toggle('hidden'); }
        function saveId() {
            const id = document.getElementById('idInput').value;
            if (id) {
                localStorage.setItem('fpl_team_id', id);
                toggleUserModal();
                App.init();
            }
        }
        function unlinkTeam() {
            localStorage.removeItem('fpl_team_id');
            App.id = null;
            toggleUserModal();
            App.init();
        }

        document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
</html>
