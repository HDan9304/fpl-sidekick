<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Hub Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #37003c; --accent: #00ff85;
            --bg-body: #f0f2f5; --bg-app: #ffffff;
            --text-main: #111827; --text-sub: #6b7280;
            --border: #e5e7eb; --red: #e90052;
            
            /* REFINED PITCH COLORS */
            --grass-1: #02894e; 
            --grass-2: #027a45; /* Darker stripe */
            
            /* FDR Colors */
            --fdr-1: #375523; --fdr-2: #01fc7a; --fdr-3: #e7e7e7; --fdr-4: #ff1751; --fdr-5: #80072d;
            --fdr-text-dark: #00381b; --fdr-text-light: white;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; }

        /* APP SHELL */
        .app-container {
            width: 100%; max-width: 600px; background-color: var(--bg-app);
            min-height: 100vh; position: relative; display: flex; flex-direction: column;
        }
        @media (min-width: 600px) {
            body { padding: 40px 0; }
            .app-container {
                min-height: auto; border-radius: 24px;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
                height: 90vh; overflow: hidden;
            }
        }

        /* HEADER */
        header {
            background: var(--bg-app); height: 60px; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 50;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { font-size: 1.2rem; cursor: pointer; padding: 8px; margin-left: -8px; }
        .brand { font-weight: 800; font-size: 1.2rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .brand i { color: var(--accent); }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #f3f4f6;
            border: 1px solid var(--border); color: var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .user-avatar.active { background: var(--primary); color: var(--accent); border-color: var(--primary); }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: 0; height: 100%; width: 280px;
            background: var(--bg-app); z-index: 200; transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 25px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }
        .menu-header { height: 60px; display: flex; align-items: center; padding-left: 24px; font-weight: 800; color: var(--primary); font-size: 1.2rem; border-bottom: 1px solid var(--border); }
        .menu-items { flex: 1; padding-top: 10px; }
        .menu-item { display: flex; align-items: center; gap: 16px; padding: 16px 24px; color: var(--text-sub); font-weight: 600; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .menu-item:hover { background: #f9fafb; color: var(--primary); }
        .menu-item.active { color: var(--primary); background: rgba(55, 0, 60, 0.04); border-left-color: var(--primary); }
        .menu-footer { padding: 24px; border-top: 1px solid var(--border); }
        .reset-btn { color: var(--red); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 150; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px); }
        .menu-overlay.open { opacity: 1; visibility: visible; }

        /* CONTENT */
        .content { padding: 15px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
        
        .welcome-card { text-align: center; padding: 40px 20px; background: #fafafa; border-radius: 20px; border: 1px solid var(--border); margin-top: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 12px; text-align: center; margin: 20px 0; outline: none; background: white; font-size: 1rem; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        
        .demo-alert { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 0.8rem; text-align: center; margin-bottom: 15px; border: 1px solid #ffeeba; }

        /* --- NEW SCOREBOARD HEADER --- */
        .scoreboard {
            background: var(--primary); color: white; padding: 20px;
            border-radius: 16px; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(55, 0, 60, 0.2);
        }
        .manager-name { font-size: 1.1rem; font-weight: 800; text-align: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; font-weight: 600; letter-spacing: 0.5px; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--accent); }
        .stat-val-small { font-size: 0.9rem; font-weight: 700; color: white; }

        /* --- REFINED PITCH --- */
        .pitch-wrapper {
            background: #fff; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 20px;
        }
        
        /* Budget Bar */
        .budget-bar {
            background: white; padding: 8px 15px; display: flex; justify-content: space-between;
            border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; color: var(--text-sub);
        }
        .budget-val { color: var(--primary); font-weight: 800; }

        /* Pitch Graphic with Striped Grass */
        .pitch-container {
            background: repeating-linear-gradient(
                0deg,
                var(--grass-1),
                var(--grass-1) 20px,
                var(--grass-2) 20px,
                var(--grass-2) 40px
            );
            padding: 25px 5px; position: relative; min-height: 480px;
        }
        
        /* Pitch Markings */
        .pitch-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.6; }
        .pitch-circle { width: 80px; height: 80px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .line-mid { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.4); }
        .box-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 15%; border: 2px solid rgba(255,255,255,0.4); border-top: none; }
        .box-bot { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 15%; border: 2px solid rgba(255,255,255,0.4); border-bottom: none; }

        .field-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; position: relative; z-index: 10; }
        .field-row:last-child { margin-bottom: 0; }

        /* --- PLAYER CARD REFINED --- */
        .player-pill {
            background: rgba(255,255,255,0.95);
            width: 68px; padding: 6px 2px;
            border-radius: 6px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }
        
        .kit-img {
            width: 36px; height: 46px; object-fit: contain; margin-bottom: -2px; margin-top: 2px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
        }

        .pill-name { 
            font-size: 0.65rem; font-weight: 700; color: #111; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            width: 100%; background: white; margin-top: 2px; padding: 1px 0;
        }
        
        .pill-data { 
            font-size: 0.6rem; color: #555; font-weight: 500; 
            display: flex; gap: 4px; justify-content: center; width: 100%;
            background: #f3f4f6; border-radius: 0 0 4px 4px; padding-bottom: 2px;
        }
        
        /* New Points Badge */
        .points-badge { 
            background: var(--primary); color: white; 
            padding: 0 4px; border-radius: 3px; font-weight: 700; 
        }

        /* Fixture Badge */
        .fix-badge {
            font-size: 0.5rem; font-weight: 700; padding: 1px 4px;
            border-radius: 3px; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
            white-space: nowrap; box-shadow: 0 1px 2px rgba(0,0,0,0.2); z-index: 20;
        }
        .fdr-1, .fdr-2 { background: var(--fdr-2); color: var(--fdr-text-dark); }
        .fdr-3 { background: var(--fdr-3); color: #333; }
        .fdr-4 { background: var(--fdr-4); color: white; }
        .fdr-5 { background: var(--fdr-5); color: white; }

        /* Captain Badge */
        .captain-badge {
            position: absolute; bottom: 30px; right: -4px;
            background: #111; color: white; border-radius: 50%;
            width: 16px; height: 16px; font-size: 0.6rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3); border: 1px solid white; z-index: 15;
        }
        .vice-badge { background: #666; }

        /* Bench */
        .bench-wrapper { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .bench-header { background: #f8f9fa; padding: 8px 15px; font-size: 0.7rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        .bench-row { display: flex; justify-content: space-around; padding: 15px; background: #fdfdfd; }
        .bench-pill { opacity: 0.85; }

        .spinner { width: 30px; height: 30px; border: 3px solid rgba(55,0,60,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="sidebar">
        <div class="menu-header">FPL Hub</div>
        <div class="menu-items">
            <div id="nav-squad" class="menu-item active" onclick="switchTool('squad')">
                <i class="fa-solid fa-shirt"></i> Squad
            </div>
            <div id="nav-transfers" class="menu-item" onclick="switchTool('transfers')">
                <i class="fa-solid fa-arrow-right-arrow-left"></i> Suggestions
            </div>
        </div>
        <div class="menu-footer">
            <div class="reset-btn" onclick="clearData()"><i class="fa-solid fa-power-off"></i> Reset App</div>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="header-left">
                <div class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
                <div class="brand"><i class="fa-solid fa-bolt"></i> FPL Hub</div>
            </div>
            <div class="user-avatar" id="userIcon" onclick="clearData()"><i class="fa-regular fa-user"></i></div>
        </header>

        <div class="content">
            <div id="welcomeView" class="welcome-card hidden">
                <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
                <h2>Link Team</h2>
                <p style="color: var(--text-sub); margin-bottom: 20px;">Enter your ID to unlock the Pro Dashboard.</p>
                <input type="number" id="teamID" placeholder="e.g. 123456">
                <button class="btn" onclick="app.load()">Connect</button>
            </div>

            <div id="loadingView" class="welcome-card hidden" style="padding: 60px 20px;">
                <div class="spinner"></div>
                <p id="loadingMsg" style="color: var(--text-sub);">Analysing Squad...</p>
            </div>

            <div id="dashboardView" class="hidden">
                <div id="demoAlert" class="demo-alert hidden">
                    <i class="fa-solid fa-triangle-exclamation"></i> Network Busy. Showing <b>Demo Data</b>.
                </div>

                <div class="scoreboard">
                    <div class="manager-name" id="dispName">...</div>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">GW Points</div>
                            <div class="stat-val" id="dispGW">...</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Total Pts</div>
                            <div class="stat-val-small" id="dispTotal">...</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Rank</div>
                            <div class="stat-val-small" id="dispRank">...</div>
                        </div>
                    </div>
                </div>

                <div class="pitch-wrapper">
                    <div class="budget-bar">
                        <span>Bank: <span class="budget-val" id="dispBank">£0.0m</span></span>
                        <span>Value: <span class="budget-val" id="dispValue">£0.0m</span></span>
                    </div>

                    <div class="pitch-container">
                        <div class="pitch-lines">
                            <div class="box-top"></div>
                            <div class="line-mid"></div>
                            <div class="pitch-circle"></div>
                            <div class="box-bot"></div>
                        </div>
                        <div id="pitchRows"></div>
                    </div>
                </div>

                <div class="bench-wrapper">
                    <div class="bench-header">Substitutes</div>
                    <div id="benchRow" class="bench-row"></div>
                </div>
            </div>

            <div id="transfersView" class="hidden">
                <div class="welcome-card">
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">🔮</div>
                    <h2>Transfer Hub</h2>
                    <p>Coming next...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MOCK DATA ---
        const MOCK_DATA = {
            user: { name: "Demo Manager", summary_overall_points: 950, summary_event_points: 45, summary_overall_rank: 125000 },
            bank: 5, value: 1024,
            picks: [
                { element: 1, position: 1, is_captain: false }, { element: 2, position: 2, is_captain: false }, 
                { element: 3, position: 3, is_captain: false }, { element: 4, position: 4, is_captain: false }, 
                { element: 5, position: 5, is_captain: false, is_vice_captain: true }, { element: 6, position: 6, is_captain: false }, 
                { element: 7, position: 7, is_captain: false }, { element: 8, position: 8, is_captain: false }, 
                { element: 9, position: 9, is_captain: true }, { element: 10, position: 10, is_captain: false },
                { element: 11, position: 11, is_captain: false }, { element: 12, position: 12, is_captain: false }, 
                { element: 13, position: 13, is_captain: false }, { element: 14, position: 14, is_captain: false }, 
                { element: 15, position: 15, is_captain: false }
            ],
            players: {
                1: { web_name: "Pickford", team_code: 11, pos: 1, price: 4.5, event_points: 6 },
                2: { web_name: "Trent", team_code: 14, pos: 2, price: 8.0, event_points: 2 },
                3: { web_name: "Saliba", team_code: 3, pos: 2, price: 5.5, event_points: 6 },
                4: { web_name: "Porro", team_code: 6, pos: 2, price: 5.0, event_points: 1 },
                5: { web_name: "Salah", team_code: 14, pos: 3, price: 13.0, event_points: 12 },
                6: { web_name: "Saka", team_code: 3, pos: 3, price: 9.0, event_points: 8 },
                7: { web_name: "Palmer", team_code: 8, pos: 3, price: 6.0, event_points: 10 },
                8: { web_name: "Gordon", team_code: 4, pos: 3, price: 6.5, event_points: 5 },
                9: { web_name: "Haaland", team_code: 43, pos: 4, price: 14.0, event_points: 13 },
                10: { web_name: "Watkins", team_code: 7, pos: 4, price: 8.5, event_points: 2 },
                11: { web_name: "Isak", team_code: 4, pos: 4, price: 7.5, event_points: 8 },
                12: { web_name: "Areola", team_code: 21, pos: 1, price: 4.0, event_points: 2 },
                13: { web_name: "Burn", team_code: 4, pos: 2, price: 4.0, event_points: 0 },
                14: { web_name: "Garnacho", team_code: 1, pos: 3, price: 5.0, event_points: 1 },
                15: { web_name: "Archer", team_code: 49, pos: 4, price: 4.5, event_points: 2 }
            },
            fixtures: {
                3: { opp: "MUN", diff: 4, is_home: true }, 14: { opp: "MCI", diff: 5, is_home: false },
                6: { opp: "CRY", diff: 2, is_home: true }, 43: { opp: "LIV", diff: 5, is_home: true }
            }
        };

        const app = {
            currentTool: 'squad',
            init: () => {
                const savedId = localStorage.getItem('fpl_id_final');
                if(savedId) {
                    document.getElementById('userIcon').classList.add('active');
                    document.getElementById('teamID').value = savedId;
                    app.load(savedId);
                } else { app.show('welcomeView'); }
            },
            show: (viewId) => {
                ['welcomeView', 'loadingView', 'dashboardView', 'transfersView'].forEach(v => document.getElementById(v).classList.add('hidden'));
                document.getElementById(viewId).classList.remove('hidden');
            },
            toggleMenu: () => { document.getElementById('sideMenu').classList.toggle('open'); document.getElementById('menuOverlay').classList.toggle('open'); },
            switchTool: (t) => {
                app.toggleMenu(); app.currentTool = t;
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                document.getElementById('nav-' + t).classList.add('active');
                if (t === 'squad') {
                    if(document.getElementById('pitchRows').innerHTML !== '') app.show('dashboardView');
                    else app.load(localStorage.getItem('fpl_id_final'));
                } else app.show('transfersView');
            },
            fetchUrl: async (targetUrl) => {
                const proxies = [(url) => `https://corsproxy.io/?${encodeURIComponent(url)}`, (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
                for (let i = 0; i < proxies.length; i++) {
                    try {
                        const c = new AbortController(); const id = setTimeout(() => c.abort(), 8000);
                        const r = await fetch(proxies[i](targetUrl), { signal: c.signal }); clearTimeout(id);
                        if(r.ok) return await r.json();
                    } catch (e) {}
                }
                throw new Error("Failed");
            },
            load: async (savedId = null) => {
                const id = savedId || document.getElementById('teamID').value;
                if(!id) return alert("Enter ID");
                localStorage.setItem('fpl_id_final', id);
                document.getElementById('userIcon').classList.add('active');
                app.show('loadingView');

                try {
                    document.getElementById('loadingMsg').innerText = "Connecting...";
                    const staticData = await app.fetchUrl('https://fantasy.premierleague.com/api/bootstrap-static/');
                    const user = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/`);
                    const gw = staticData.events.find(e => e.is_current)?.id || 1;
                    const picks = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/event/${gw}/picks/`);
                    
                    document.getElementById('loadingMsg').innerText = "Checking Fixtures...";
                    const fixtures = await app.fetchUrl(`https://fantasy.premierleague.com/api/fixtures/?event=${gw}`);

                    const fixMap = {};
                    const teamShort = {};
                    staticData.teams.forEach(t => teamShort[t.id] = t.short_name);
                    
                    fixtures.forEach(f => {
                        fixMap[f.team_h] = { opp: teamShort[f.team_a], diff: f.team_h_difficulty, is_home: true };
                        fixMap[f.team_a] = { opp: teamShort[f.team_h], diff: f.team_a_difficulty, is_home: false };
                    });

                    const players = {};
                    staticData.elements.forEach(p => {
                        players[p.id] = {
                            name: p.web_name, team: teamShort[p.team], team_id: p.team,
                            pos: p.element_type, price: p.now_cost / 10,
                            event_points: p.event_points, team_code: p.team_code
                        };
                    });

                    document.getElementById('demoAlert').classList.add('hidden');
                    // Pass budget info
                    app.render(user, picks.picks, players, fixMap, picks.entry_history);

                } catch (error) {
                    document.getElementById('demoAlert').classList.remove('hidden');
                    const mockPlayers = {};
                    Object.values(MOCK_DATA.players).forEach((p, i) => {
                         mockPlayers[i+1] = { ...p, team: "MOCK", team_id: 3 }; 
                    });
                    const mockFix = MOCK_DATA.fixtures;
                    for(let i=1; i<20; i++) { if(!mockFix[i]) mockFix[i] = { opp: "AVL", diff: 3, is_home: true }; }
                    
                    setTimeout(() => { 
                        app.render(MOCK_DATA.user, MOCK_DATA.picks, mockPlayers, mockFix, { bank: MOCK_DATA.bank, value: MOCK_DATA.value }); 
                    }, 1000);
                }
            },
            render: (user, picks, players, fixMap, stats) => {
                // RENDER SCOREBOARD
                document.getElementById('dispName').innerText = user.name;
                document.getElementById('dispGW').innerText = user.summary_event_points || 0;
                document.getElementById('dispTotal').innerText = user.summary_overall_points || 0;
                document.getElementById('dispRank').innerText = (user.summary_overall_rank || 0).toLocaleString();

                // RENDER BUDGET BAR
                document.getElementById('dispBank').innerText = `£${(stats.bank/10).toFixed(1)}m`;
                document.getElementById('dispValue').innerText = `£${(stats.value/10).toFixed(1)}m`;

                const pitchDiv = document.getElementById('pitchRows');
                const benchDiv = document.getElementById('benchRow');
                pitchDiv.innerHTML = ''; benchDiv.innerHTML = '';
                const formation = { 1: [], 2: [], 3: [], 4: [] };

                for (let i = 0; i < 11; i++) {
                    const pick = picks[i];
                    const p = players[pick.element] || players[i+1];
                    if (p) formation[p.pos].push({ ...p, is_captain: pick.is_captain, is_vice: pick.is_vice_captain });
                }

                [1, 2, 3, 4].forEach(posId => {
                    const row = document.createElement('div'); row.className = 'field-row';
                    formation[posId].forEach(p => row.innerHTML += app.createPill(p, fixMap));
                    pitchDiv.appendChild(row);
                });

                for (let i = 11; i < picks.length; i++) {
                    const pick = picks[i];
                    const p = players[pick.element] || players[i+1];
                    if(p) benchDiv.innerHTML += app.createPill({ ...p, is_captain: false, is_vice: false }, fixMap, true);
                }
                app.show('dashboardView');
            },
            createPill: (p, fixMap, isBench = false) => {
                let capBadge = '';
                if (p.is_captain) capBadge = `<div class="captain-badge">C</div>`;
                else if (p.is_vice) capBadge = `<div class="captain-badge vice-badge">V</div>`;
                
                const kitUrl = `https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${p.team_code}-66.png`;
                const fix = fixMap[p.team_id] || { opp: '-', diff: 3, is_home: true };
                const loc = fix.is_home ? '(H)' : '(A)';
                
                return `
                    <div class="player-pill ${isBench ? 'bench-pill' : ''}">
                        ${capBadge}
                        <div class="fix-badge fdr-${fix.diff}">${fix.opp} ${loc}</div>
                        <img src="${kitUrl}" class="kit-img" onerror="this.style.display='none'">
                        <div class="pill-name">${p.name}</div>
                        <div class="pill-data">
                            <span>£${p.price}</span>
                            <span class="points-badge">${p.event_points}</span>
                        </div>
                    </div>
                `;
            }
        };

        function toggleMenu() { app.toggleMenu(); }
        function switchTool(t) { app.switchTool(t); }
        function clearData() { if(confirm("Logout?")) { localStorage.removeItem('fpl_id_final'); location.reload(); } }
        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
