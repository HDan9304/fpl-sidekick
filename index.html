<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Sidekick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- BRANDING & FONTS --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }
        
        .fpl-purple { background-color: #37003c; }
        .fpl-green { color: #00ff85; }
        
        /* --- UTILITY CLASSES --- */
        .glass-card {
            background: rgba(255, 255, 255, 1);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        
        /* --- PITCH VISUALIZATION --- */
        .pitch-bg {
            background: linear-gradient(180deg, #1a904e 0%, #158043 100%);
            border: 2px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        /* Center Line */
        .pitch-bg::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            border-top: 1px solid rgba(255,255,255,0.3);
            z-index: 0;
        }
        /* Center Circle */
        .pitch-bg::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="fpl-purple text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-shirt text-2xl fpl-green"></i>
                <h1 class="text-xl font-bold tracking-tight">FPL <span class="fpl-green">Sidekick</span></h1>
            </div>
            <button class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 space-y-6">

        <div class="fpl-purple rounded-2xl p-8 text-white shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-48 h-48 bg-[#00ff85] rounded-full opacity-20 blur-3xl"></div>
            
            <div class="relative z-10 md:flex md:justify-between md:items-center">
                <div class="mb-6 md:mb-0">
                    <h2 class="text-3xl font-bold mb-2">Welcome to FPL Sidekick</h2>
                    <p class="text-gray-300 max-w-lg">Your elite fantasy companion. We analyze live data to help you make the smartest transfers and optimize your rank.</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-chart-line fpl-green text-xl"></i>
                        <span class="text-sm font-semibold">Live Prices</span>
                    </div>
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-chess-knight fpl-green text-xl"></i>
                        <span class="text-sm font-semibold">Strategy</span>
                    </div>
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-robot fpl-green text-xl"></i>
                        <span class="text-sm font-semibold">AI Points</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl p-1 shadow-sm border border-gray-200">
            <div class="p-4 flex justify-between items-end border-b border-gray-100 mb-2">
                <div>
                    <h3 class="text-lg font-bold text-gray-800">The "Template" Team</h3>
                    <p class="text-xs text-gray-500">Based on highest live ownership %</p>
                </div>
                <span class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-bold shadow-sm" id="formation-label">Loading...</span>
            </div>

            <div id="template-grid" class="pitch-bg w-full rounded-lg flex flex-col justify-between h-[650px] md:h-[750px] p-2 md:p-6 shadow-inner">
                <div class="flex flex-col justify-center items-center h-full text-white/70 animate-pulse gap-2">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl"></i>
                    <span class="text-sm font-semibold">Fetching Live FPL Data...</span>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. CONFIGURATION
        const PROXY_URL = "https://api.allorigins.win/raw?url=";
        const FPL_API = "https://fantasy.premierleague.com/api/bootstrap-static/";
        const IMG_URL = "https://resources.premierleague.com/premierleague/photos/players/110x140/p";

        // 2. FETCH DATA FUNCTION
        async function fetchAndRender() {
            try {
                // Use Promise.all to prepare for multiple data sources
                const [bootstrapData] = await Promise.all([
                    fetch(PROXY_URL + encodeURIComponent(FPL_API)).then(res => res.json())
                ]);
                
                // DATA PROCESSING
                const players = bootstrapData.elements.sort((a, b) => parseFloat(b.selected_by_percent) - parseFloat(a.selected_by_percent));
                const teams = bootstrapData.teams;
                
                // Helper to get top players by position
                const getTop = (posId, count) => players.filter(p => p.element_type === posId).slice(0, count);
                
                // FORCE 3-5-2 FORMATION FOR TEMPLATE VIEW
                const formation = {
                    GKP: getTop(1, 1),
                    DEF: getTop(2, 3),
                    MID: getTop(3, 5),
                    FWD: getTop(4, 2)
                };

                renderPitch(formation, teams);
                document.getElementById('formation-label').innerText = "Active: 3-5-2";

            } catch (error) {
                console.error("Error fetching FPL data:", error);
                document.getElementById('template-grid').innerHTML = `
                    <div class="flex flex-col justify-center items-center h-full text-white text-center">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-2 text-yellow-300"></i>
                        <p class="font-bold">Failed to load data.</p>
                        <p class="text-xs opacity-70 mt-1">Check your connection or CORS proxy.</p>
                    </div>`;
            }
        }

        // 3. RENDER PITCH VISUALS
        function renderPitch(formation, teams) {
            const container = document.getElementById('template-grid');
            let html = '';

            const rows = ['GKP', 'DEF', 'MID', 'FWD'];

            rows.forEach(pos => {
                // Z-index 10 ensures players sit above the pitch lines
                html += `<div class="flex justify-around items-center w-full z-10 relative">`; 
                
                formation[pos].forEach(p => {
                    const teamObj = teams.find(t => t.id === p.team);
                    const teamName = teamObj ? teamObj.short_name : "UNK";
                    const imageCode = p.code;
                    const price = (p.now_cost / 10).toFixed(1);
                    const ownership = p.selected_by_percent;

                    html += `
                        <div class="flex flex-col items-center w-1/5 group cursor-pointer transition-transform hover:scale-105">
                            <div class="relative mb-[-5px]">
                                <img src="${IMG_URL}${imageCode}.png" 
                                     class="w-12 h-14 md:w-16 md:h-20 object-cover drop-shadow-lg" 
                                     alt="${p.web_name}"
                                     onerror="this.src='https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_0-66.png'">
                            </div>
                            
                            <div class="bg-white/95 backdrop-blur px-2 py-1.5 rounded-lg text-center w-full max-w-[85px] shadow-md border border-gray-200">
                                <p class="text-[10px] md:text-xs font-bold truncate leading-tight text-gray-800">${p.web_name}</p>
                                <p class="text-[9px] text-gray-500 uppercase tracking-wide mb-0.5">${teamName}</p>
                                
                                <div class="flex justify-between items-center mt-1 border-t border-gray-200 pt-1">
                                    <span class="text-[9px] font-bold text-fpl-purple">£${price}</span>
                                    <span class="text-[8px] text-gray-500">${ownership}%</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // 4. INIT
        document.addEventListener('DOMContentLoaded', () => {
            fetchAndRender();
        });
    </script>
</body>
</html>
