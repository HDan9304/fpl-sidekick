<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPL Sidekick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- BRANDING & FONTS --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }
        
        .fpl-purple { background-color: #37003c; }
        .fpl-green { color: #00ff85; }
        
        /* --- UTILITY CLASSES --- */
        .glass-card {
            background: rgba(255, 255, 255, 1);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        
        /* --- PROFESSIONAL PITCH VISUALIZATION --- */
        .pitch-container {
            position: relative;
            background-color: #1a904e; /* Fallback */
            /* Realistic Mown Grass Pattern */
            background-image: repeating-linear-gradient(
                180deg,
                #1f9d55,
                #1f9d55 10%,
                #188546 10%,
                #188546 20%
            );
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        /* Pitch Markings (White Lines) */
        .pitch-lines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
        }
        
        .line-center {
            position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.6);
        }
        .line-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.6); border-radius: 50%;
        }
        .line-box-top {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 40%; height: 15%; border: 2px solid rgba(255,255,255,0.6); border-top: none;
        }
        .line-box-bottom {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 40%; height: 15%; border: 2px solid rgba(255,255,255,0.6); border-bottom: none;
        }

        /* Card Polish */
        .pro-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.06);
            border-bottom: 3px solid #ddd; /* Team Color Indicator base */
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pro-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border-bottom-color: #37003c; /* FPL Purple highlight on hover */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="fpl-purple text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-shirt text-2xl fpl-green"></i>
                <h1 class="text-xl font-bold tracking-tight">FPL <span class="fpl-green">Sidekick</span></h1>
            </div>
            <button class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 space-y-6">

        <div class="fpl-purple rounded-2xl p-8 text-white shadow-xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-48 h-48 bg-[#00ff85] rounded-full opacity-20 blur-3xl"></div>
            
            <div class="relative z-10 md:flex md:justify-between md:items-center">
                <div class="mb-6 md:mb-0">
                    <h2 class="text-3xl font-bold mb-2">Welcome to FPL Sidekick</h2>
                    <p class="text-gray-300 max-w-lg">Your elite fantasy companion. We analyze live data to help you make the smartest transfers and optimize your rank.</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-chart-line fpl-green text-xl"></i>
                        <span class="text-sm font-semibold">Live Prices</span>
                    </div>
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-chess-knight fpl-green text-xl"></i>
                        <span class="text-sm font-semibold">Strategy</span>
                    </div>
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-lg backdrop-blur-sm">
                        <i class="fa-solid fa-robot fpl-green text-xl"></i>
                        <span class="text-sm font-semibold">AI Points</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl p-1 shadow-sm border border-gray-200">
            <div class="p-4 flex justify-between items-end border-b border-gray-100 mb-2">
                <div>
                    <h3 class="text-lg font-bold text-gray-800">The "Template" Team</h3>
                    <p class="text-xs text-gray-500">Based on highest live ownership %</p>
                </div>
                <span class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full font-bold shadow-sm" id="formation-label">Loading...</span>
            </div>

            <div id="template-grid" class="pitch-container w-full h-[700px] md:h-[800px] flex flex-col relative">
                
                <div class="pitch-lines">
                    <div class="line-center"></div>
                    <div class="line-circle"></div>
                    <div class="line-box-top"></div>
                    <div class="line-box-bottom"></div>
                </div>

                <div id="pitch-content" class="relative z-10 flex flex-col justify-between h-full p-2 md:p-4">
                     <div class="flex flex-col justify-center items-center h-full text-white/80 animate-pulse gap-3">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl drop-shadow-md"></i>
                        <span class="text-sm font-bold uppercase tracking-widest drop-shadow-md">Scouting Live Data...</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. CONFIGURATION
        const FPL_API = "https://fantasy.premierleague.com/api/bootstrap-static/";
        const IMG_URL = "https://resources.premierleague.com/premierleague/photos/players/110x140/p";

        // 2. PROXY HELPER
        async function fetchWithFallback(targetUrl) {
            const proxies = [
                (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`, 
                (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                (url) => `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`
            ];

            const statusEl = document.getElementById('connection-status');

            for (let i = 0; i < proxies.length; i++) {
                try {
                    if(statusEl) statusEl.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Trying Proxy ${i+1}...`;
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); // 6s timeout

                    const response = await fetch(proxies[i](targetUrl), { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        if(statusEl) {
                            statusEl.innerHTML = `<i class="fa-solid fa-check text-green-400"></i> Live`;
                            statusEl.classList.add('text-green-400');
                        }
                        return await response.json();
                    }
                } catch (e) { console.warn(`Proxy ${i+1} failed`); }
            }
            if(statusEl) statusEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-400"></i> Error`;
            throw new Error("All proxies failed");
        }

        // 3. FETCH DATA FUNCTION
        async function fetchAndRender() {
            try {
                // Use Promise.all (Ready for adding more endpoints like Fixtures later)
                const [bootstrapData] = await Promise.all([
                    fetchWithFallback(FPL_API)
                ]);
                
                // DATA PROCESSING
                const players = bootstrapData.elements.sort((a, b) => parseFloat(b.selected_by_percent) - parseFloat(a.selected_by_percent));
                const teams = bootstrapData.teams;
                
                // Helper to get top players by position
                const getTop = (posId, count) => players.filter(p => p.element_type === posId).slice(0, count);
                
                // SELECT FULL SQUAD (15 Players)
                const allGk = getTop(1, 2);
                const allDef = getTop(2, 5);
                const allMid = getTop(3, 5);
                const allFwd = getTop(4, 3);

                // Format: 3-4-3 (Popular Template) + 4 Bench
                const formation = {
                    GKP: [allGk[0]],
                    DEF: allDef.slice(0, 3),
                    MID: allMid.slice(0, 4),
                    FWD: allFwd.slice(0, 3),
                    BENCH: [allGk[1], allDef[3], allDef[4], allMid[4]]
                };

                renderPitch(formation, teams);
                document.getElementById('formation-label').innerText = "Active: 3-5-2";

            } catch (error) {
                console.error("Error fetching FPL data:", error);
                document.getElementById('template-grid').innerHTML = `
                    <div class="flex flex-col justify-center items-center h-full text-white text-center">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-2 text-yellow-300"></i>
                        <p class="font-bold">Failed to load data.</p>
                        <p class="text-xs opacity-70 mt-1">Check your connection or CORS proxy.</p>
                    </div>`;
            }
        }

        // 3. RENDER PITCH VISUALS
        function renderPitch(formation, teams) {
            const container = document.getElementById('pitch-content');
            let html = '';
            
            // --- ON PITCH (Starters) ---
            const rows = ['GKP', 'DEF', 'MID', 'FWD'];
            
            // Top Spacing for Goalkeeper
            html += `<div class="flex-grow flex flex-col justify-around py-2">`;
            
            rows.forEach(pos => {
                html += `<div class="flex justify-center gap-2 md:gap-8 w-full">`; 
                formation[pos].forEach(p => html += createPlayerCard(p, teams, false));
                html += `</div>`;
            });
            
            html += `</div>`; // End Starters Container

            // --- THE DUGOUT (Bench) ---
            html += `
                <div class="mt-2 mx-1 md:mx-4 bg-gray-900/80 backdrop-blur-md rounded-xl border-t-4 border-fpl-purple p-2 shadow-2xl relative">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-fpl-purple text-white text-[9px] font-bold px-3 py-0.5 rounded-full uppercase tracking-widest border border-white/20">
                        Substitutes
                    </div>
                    <div class="flex justify-around items-center pt-1">
                        ${formation.BENCH.map(p => createPlayerCard(p, teams, true)).join('')}
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        function createPlayerCard(p, teams, isBench) {
            const teamObj = teams.find(t => t.id === p.team);
            const teamName = teamObj ? teamObj.short_name : "UNK";
            const price = (p.now_cost / 10).toFixed(1);
            
            const isGK = p.element_type === 1;
            const kitUrl = `https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_${p.team_code}${isGK ? '_1' : ''}-66.png`;

            // Professional Card Layout
            // Uses 'pro-card' class we added in CSS
            return `
                <div class="flex flex-col items-center w-[18%] md:w-[140px] group cursor-pointer relative ${isBench ? 'opacity-85' : ''}">
                    
                    <div class="relative z-20 -mb-3 transition-transform duration-300 group-hover:-translate-y-2 group-hover:scale-110">
                        <img src="${kitUrl}" 
                             class="w-12 h-14 md:w-16 md:h-20 object-contain drop-shadow-xl filter brightness-110 contrast-110" 
                             alt="${p.web_name}">
                    </div>
                    
                    <div class="pro-card w-full pt-4 pb-1.5 px-1 text-center relative z-10">
                        <div class="text-[10px] md:text-sm font-bold text-gray-800 leading-tight truncate px-1">
                            ${p.web_name}
                        </div>
                        
                        <div class="text-[9px] font-semibold text-gray-400 uppercase tracking-wide mb-1">
                            ${teamName}
                        </div>

                        <div class="flex justify-center gap-1 mt-1">
                            <span class="text-[9px] bg-purple-50 text-fpl-purple px-1.5 py-0.5 rounded font-bold border border-purple-100">
                                £${price}
                            </span>
                            <span class="text-[9px] bg-green-50 text-green-700 px-1.5 py-0.5 rounded font-bold border border-green-100">
                                ${p.selected_by_percent}%
                            </span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 4. INIT
        document.addEventListener('DOMContentLoaded', () => {
            fetchAndRender();
        });
    </script>
</body>
</html>
