<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Scout</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>FPL Scout</h1>
            <p>Team Analyzer & Transfer Helper</p>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="input-group">
                <label for="teamID" class="input-label">Enter Team ID</label>
                <input type="number" id="teamID" placeholder="e.g. 123456">
            </div>
            
            <button id="searchBtn">Find Team</button>

            <div id="loading" class="hidden">
                <div class="loading-spinner"></div>
                <p>Scouting Database...</p>
            </div>

            <div id="result" class="hidden">
                </div>
        </div>
    </main>

    <footer>
        <p>Unofficial FPL Tool. Data via Fantasy Premier League API.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
