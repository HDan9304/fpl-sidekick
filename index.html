<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FPL Hub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 1. DESIGN SYSTEM --- */
        :root {
            --primary: #37003c;   /* Dark Purple */
            --accent: #00ff85;    /* Neon Green */
            --bg-body: #f0f2f5;   /* Desktop Background */
            --bg-app: #ffffff;    /* App Card Background */
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --red: #e90052;
        }

        /* --- 2. GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* --- 3. APP CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--bg-app);
            min-height: 100vh;
            position: relative;
            box-shadow: none;
        }

        @media (min-width: 600px) {
            body { padding-top: 40px; padding-bottom: 40px; }
            .app-container {
                min-height: auto;
                border-radius: 24px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                overflow: hidden; /* Clips content to corners */
                height: 90vh; /* Fixed height on desktop for scrolling */
                overflow-y: auto; /* Scroll inside the card */
            }
        }

        /* --- 4. HEADER --- */
        header {
            background: var(--bg-app);
            height: 65px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .menu-btn {
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            padding: 8px;
            margin-left: -8px; /* Alignment fix */
        }

        .brand {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
            display: flex; align-items: center; gap: 8px;
            letter-spacing: -0.5px;
        }
        .brand i { color: var(--accent); }

        .user-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: #f3f4f6;
            border: 1px solid var(--border);
            color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .user-avatar.active {
            background: var(--primary); color: var(--accent); border-color: var(--primary);
        }

        /* --- 5. SIDEBAR MENU --- */
        .sidebar {
            position: fixed; top: 0; left: 0; height: 100%; width: 280px;
            background: var(--bg-app); z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }

        .menu-header {
            height: 65px; display: flex; align-items: center; padding-left: 24px;
            font-weight: 800; color: var(--primary); font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
        }

        .menu-items { flex: 1; padding-top: 10px; }

        .menu-item {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 24px;
            color: var(--text-sub); font-weight: 600; cursor: pointer;
            border-left: 4px solid transparent; transition: 0.2s;
        }
        .menu-item:hover { background: #f9fafb; color: var(--primary); }
        .menu-item.active {
            color: var(--primary); background: rgba(55, 0, 60, 0.04);
            border-left-color: var(--primary);
        }
        .menu-item i { width: 20px; text-align: center; font-size: 1.1rem; }

        .menu-footer { padding: 24px; border-top: 1px solid var(--border); }
        .reset-btn {
            color: var(--red); font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 10px; font-size: 0.9rem;
        }

        /* Overlay */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 150;
            opacity: 0; visibility: hidden; transition: 0.3s;
            backdrop-filter: blur(2px);
        }
        .menu-overlay.open { opacity: 1; visibility: visible; }


        /* --- 6. CONTENT VIEWS --- */
        .content { padding: 20px; padding-bottom: 80px; }

        /* Welcome Card */
        .welcome-card {
            text-align: center; padding: 40px 20px; background: #fafafa;
            border-radius: 20px; border: 1px solid var(--border); margin-top: 20px;
        }
        input {
            width: 100%; padding: 14px; border: 2px solid var(--border);
            border-radius: 12px; text-align: center; margin: 20px 0; outline: none;
            background: white; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); }
        .btn {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
            font-size: 1rem;
        }

        /* Dashboard */
        .manager-header {
            background: var(--primary); color: white; padding: 25px;
            border-radius: 16px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(55, 0, 60, 0.2);
        }
        .manager-name { font-size: 1.3rem; font-weight: 700; }
        .manager-stats { opacity: 0.9; font-size: 0.9rem; margin-top: 5px; }

        .section-label {
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
            color: var(--text-sub); margin-bottom: 10px; letter-spacing: 1px; padding-left: 5px;
        }

        .list-box { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }

        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid #f3f4f6;
        }
        .player-row:last-child { border-bottom: none; }

        .p-left { display: flex; align-items: center; gap: 12px; }
        .pos-dot { width: 8px; height: 8px; border-radius: 50%; }
        .pos-1 { background: #eab308; } .pos-2 { background: #3b82f6; }
        .pos-3 { background: #22c55e; } .pos-4 { background: #ef4444; }

        .p-name { font-weight: 600; font-size: 0.9rem; color: var(--text-main); }
        .p-meta { font-size: 0.75rem; color: var(--text-sub); }
        .p-price { font-weight: 700; font-size: 0.9rem; color: var(--primary); }

        .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; margin-left: 5px; background: #fee2e2; color: var(--red); }

        /* Spinner & Status */
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(55,0,60,0.1);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 15px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .status-log {
            font-size: 0.75rem; text-align: center; color: var(--text-sub);
            padding: 8px; background: #f3f4f6; border-radius: 8px; margin-bottom: 15px; display: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="sidebar">
        <div class="menu-header">FPL Hub</div>
        
        <div class="menu-items">
            <div id="nav-squad" class="menu-item active" onclick="switchTool('squad')">
                <i class="fa-solid fa-shirt"></i> Squad
            </div>

            <div id="nav-transfers" class="menu-item" onclick="switchTool('transfers')">
                <i class="fa-solid fa-arrow-right-arrow-left"></i> Suggestions
            </div>
        </div>

        <div class="menu-footer">
            <div class="reset-btn" onclick="clearData()">
                <i class="fa-solid fa-power-off"></i> Reset App
            </div>
        </div>
    </div>

    <div class="app-container">
        
        <header>
            <div class="header-left">
                <div class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
                <div class="brand"><i class="fa-solid fa-bolt"></i> FPL Hub</div>
            </div>
            <div class="user-avatar" id="userIcon" onclick="clearData()">
                <i class="fa-regular fa-user"></i>
            </div>
        </header>

        <div class="content">

            <div id="statusLog" class="status-log"></div>

            <div id="welcomeView" class="welcome-card hidden">
                <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
                <h2 style="font-size: 1.4rem; margin-bottom: 10px; color: var(--primary);">Link Team</h2>
                <p style="color: var(--text-sub); margin-bottom: 20px;">Enter your FPL ID to start.</p>
                <input type="number" id="teamID" placeholder="e.g. 123456">
                <button class="btn" onclick="app.load()">Connect</button>
            </div>

            <div id="loadingView" class="welcome-card hidden" style="padding: 60px 20px;">
                <div class="spinner"></div>
                <p id="loadingMsg" style="color: var(--text-sub); font-weight: 500;">Connecting...</p>
            </div>

            <div id="dashboardView" class="hidden">
                <div class="manager-header">
                    <div class="manager-name" id="dispName">...</div>
                    <div class="manager-stats" id="dispPoints">...</div>
                </div>

                <div class="section-label">Starting XI</div>
                <div id="startingList" class="list-box"></div>

                <div class="section-label" style="margin-top: 30px;">Bench</div>
                <div id="benchList" class="list-box"></div>
            </div>

            <div id="transfersView" class="hidden">
                <div class="welcome-card">
                    <div style="font-size: 2.5rem; margin-bottom: 15px;">🔮</div>
                    <h2>Transfer Hub</h2>
                    <p>This tool will be built in the next step.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const app = {
            cacheKey: 'fpl_db_univ_v2',
            cacheTime: 'fpl_ts_univ_v2',
            currentTool: 'squad',

            init: () => {
                const savedId = localStorage.getItem('fpl_id_univ');
                if(savedId) {
                    document.getElementById('userIcon').classList.add('active');
                    document.getElementById('teamID').value = savedId;
                    app.load(savedId);
                } else {
                    app.show('welcomeView');
                }
            },

            show: (viewId) => {
                // Hide all views
                ['welcomeView', 'loadingView', 'dashboardView', 'transfersView'].forEach(v => {
                    document.getElementById(v).classList.add('hidden');
                });
                // Show requested view
                document.getElementById(viewId).classList.remove('hidden');
            },

            log: (msg) => {
                const el = document.getElementById('statusLog');
                el.style.display = 'block';
                el.innerText = msg;
            },

            // --- NAVIGATION ---
            toggleMenu: () => {
                const menu = document.getElementById('sideMenu');
                const overlay = document.getElementById('menuOverlay');
                menu.classList.toggle('open');
                overlay.classList.toggle('open');
            },

            switchTool: (toolName) => {
                app.toggleMenu(); // Close menu
                app.currentTool = toolName;

                // Update Menu Styling
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                document.getElementById('nav-' + toolName).classList.add('active');

                // Route Logic
                if (toolName === 'squad') {
                    const savedId = localStorage.getItem('fpl_id_univ');
                    if(savedId && document.getElementById('startingList').innerHTML !== '') {
                        app.show('dashboardView');
                    } else if (savedId) {
                        app.load(savedId); // Reload if empty
                    } else {
                        app.show('welcomeView');
                    }
                } 
                else if (toolName === 'transfers') {
                    app.show('transfersView');
                }
            },

            // --- DATA ENGINE ---
            fetchUrl: async (targetUrl) => {
                const proxies = [
                    (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    (url) => `https://thingproxy.freeboard.io/fetch/${url}`
                ];

                for (let i = 0; i < proxies.length; i++) {
                    const proxyUrl = proxies[i](targetUrl);
                    if(i > 0) app.log(`Retrying (${i+1}/${proxies.length})...`);
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 8000);
                        const response = await fetch(proxyUrl, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        if (response.ok) return await response.json();
                    } catch (err) {}
                }
                throw new Error("Connection failed.");
            },

            load: async (savedId = null) => {
                const id = savedId || document.getElementById('teamID').value;
                if(!id) return alert("Enter ID");

                localStorage.setItem('fpl_id_univ', id);
                document.getElementById('userIcon').classList.add('active');
                
                app.show('loadingView');

                try {
                    // 1. Database
                    let staticData = null;
                    const cachedDb = localStorage.getItem(app.cacheKey);
                    const now = Date.now();

                    if(cachedDb && localStorage.getItem(app.cacheTime) && (now - localStorage.getItem(app.cacheTime) < 1800000)) {
                        app.log("Loading cache...");
                        staticData = JSON.parse(cachedDb);
                    } else {
                        app.log("Downloading DB...");
                        document.getElementById('loadingMsg').innerText = "Updating Database...";
                        staticData = await app.fetchUrl('https://fantasy.premierleague.com/api/bootstrap-static/');
                        localStorage.setItem(app.cacheKey, JSON.stringify(staticData));
                        localStorage.setItem(app.cacheTime, now);
                    }

                    // 2. Maps
                    const players = {};
                    staticData.elements.forEach(p => {
                        players[p.id] = {
                            name: p.web_name,
                            team: staticData.teams.find(t => t.id === p.team).short_name,
                            pos: p.element_type,
                            price: p.now_cost / 10,
                            form: parseFloat(p.form)
                        };
                    });
                    const gw = staticData.events.find(e => e.is_current)?.id || 1;

                    // 3. User Data
                    app.log("Scouting team...");
                    document.getElementById('loadingMsg').innerText = "Analyzing Squad...";
                    
                    const user = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/`);
                    const picks = await app.fetchUrl(`https://fantasy.premierleague.com/api/entry/${id}/event/${gw}/picks/`);

                    app.render(user, picks, players);
                    document.getElementById('statusLog').style.display = 'none';

                } catch (error) {
                    app.log("Error");
                    alert("Network Error. Please refresh.");
                    app.show('welcomeView');
                }
            },

            render: (user, picks, players) => {
                document.getElementById('dispName').innerText = user.name;
                document.getElementById('dispPoints').innerText = `${user.summary_overall_points} pts • GW${picks.entry_history.event}`;

                const sList = document.getElementById('startingList');
                const bList = document.getElementById('benchList');
                sList.innerHTML = ''; bList.innerHTML = '';

                picks.picks.forEach((pick, i) => {
                    const p = players[pick.element];
                    if(!p) return;

                    let badge = '';
                    if(i < 11 && p.form < 2.5) {
                        badge = `<span class="chip chip-cold"><i class="fa-regular fa-snowflake"></i> ${p.form}</span>`;
                    }

                    const html = `
                        <div class="player-row">
                            <div class="p-left">
                                <div class="pos-dot pos-${p.pos}"></div>
                                <div>
                                    <div class="p-name">${p.name} ${badge}</div>
                                    <div class="p-meta">${p.team}</div>
                                </div>
                            </div>
                            <div class="p-price">£${p.price}</div>
                        </div>
                    `;

                    if(i < 11) sList.innerHTML += html;
                    else bList.innerHTML += html;
                });

                app.show('dashboardView');
            }
        };

        // Global functions for HTML access
        function toggleMenu() { app.toggleMenu(); }
        function switchTool(t) { app.switchTool(t); }
        function clearData() {
            if(confirm("Logout?")) {
                localStorage.removeItem('fpl_id_univ');
                location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
